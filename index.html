<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>NexusMine | Crypto Mining Platform</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }

    body {
      background: radial-gradient(circle at 10% 20%, #0a0f1e, #03050b);
      min-height: 100vh;
      padding: 16px;
    }

    .app-container {
      max-width: 520px;
      margin: 0 auto;
    }

    /* Cards & Glassmorphism */
    .card {
      background: rgba(12, 18, 28, 0.85);
      backdrop-filter: blur(12px);
      border-radius: 28px;
      padding: 24px 20px;
      margin-bottom: 16px;
      border: 1px solid rgba(0, 255, 255, 0.25);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      transition: transform 0.2s ease;
    }

    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    .header h1 {
      font-size: 2rem;
      background: linear-gradient(135deg, #aaffff, #2ad4ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
    }

    .header p {
      font-size: 0.75rem;
      color: #7e8cac;
      margin-top: 6px;
    }

    /* Inputs */
    .input-group {
      margin-bottom: 18px;
    }

    .input-group label {
      display: block;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      color: #8aa9d1;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }

    .input-group input,
    .input-group textarea {
      width: 100%;
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid #2e3f5a;
      padding: 14px 16px;
      border-radius: 20px;
      color: white;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.2s;
    }

    .input-group input:focus,
    .input-group textarea:focus {
      border-color: #2ad4ff;
      box-shadow: 0 0 10px rgba(42, 212, 255, 0.3);
    }

    /* Buttons */
    button {
      width: 100%;
      background: linear-gradient(95deg, #0e2a3b, #0a1a2f);
      border: 1px solid #2ad4ff;
      padding: 14px;
      border-radius: 40px;
      color: #ccf4ff;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 8px;
    }

    button:active {
      transform: scale(0.97);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .mine-btn {
      background: radial-gradient(circle at 30% 10%, #ffb347, #ff7e05);
      border: none;
      font-size: 1.2rem;
      box-shadow: 0 0 12px rgba(255, 170, 51, 0.5);
      color: #0a0f1a;
    }

    /* Stats */
    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px dashed #2e3f55;
    }

    .stat-row:last-child {
      border-bottom: none;
    }

    .stat-label {
      color: #8aa9d1;
      font-size: 0.85rem;
    }

    .stat-value {
      color: #eef5ff;
      font-weight: 600;
      word-break: break-all;
      text-align: right;
    }

    /* Messages */
    .message {
      background: rgba(0, 0, 0, 0.5);
      padding: 10px;
      border-radius: 18px;
      margin-top: 14px;
      text-align: center;
      font-size: 0.8rem;
    }

    .error-msg {
      color: #ff9e8f;
    }

    .success-msg {
      color: #8effc2;
    }

    .info-msg {
      color: #8fcbff;
    }

    /* Toggle */
    .toggle-group {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    .toggle-btn {
      background: rgba(0, 0, 0, 0.5);
      border-color: #3e4f6a;
      margin-top: 0;
    }

    .toggle-btn.active {
      background: #1e2a47;
      border-color: #2ad4ff;
      box-shadow: 0 0 6px cyan;
    }

    /* Mining animation */
    .mining-animation {
      text-align: center;
      font-size: 2.5rem;
      margin: 12px 0;
      letter-spacing: 6px;
    }

    @keyframes pulseGlow {
      0%, 100% {
        text-shadow: 0 0 2px cyan;
      }
      50% {
        text-shadow: 0 0 14px cyan;
      }
    }

    .glow-text {
      animation: pulseGlow 1.2s ease-in-out infinite;
    }

    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: bold;
    }

    .badge-admin {
      background: rgba(255, 0, 255, 0.2);
      color: #f0a3ff;
      border: 1px solid #f0a3ff;
    }

    .badge-user {
      background: rgba(0, 255, 200, 0.15);
      color: #7effe0;
      border: 1px solid #7effe0;
    }

    .footer {
      text-align: center;
      font-size: 0.65rem;
      color: #4f5e7e;
      margin-top: 10px;
    }
  </style>
</head>
<body>
<div class="app-container" id="appRoot">
  <div class="header">
    <h1>⚡ NEXUS MINE</h1>
    <p>decentralized · mine & earn</p>
  </div>
  <div id="dynamicPanel">
    <div class="card" style="text-align: center;">
      <div>🔄 Initializing secure connection...</div>
      <div style="font-size: 0.7rem; margin-top: 10px;">Contacting mining network</div>
    </div>
  </div>
  <div class="footer">
    🔒 24h cooldown | 💎 0.2 NXM per mine
  </div>
</div>

<script>
  // ============================================================
  // YOUR GOOGLE APPS SCRIPT WEB APP URL (fixed, never change)
  // ============================================================
  const API_BASE_URL = "https://script.google.com/macros/s/AKfycbyALBxEeRVOeDZPXjRZzDJ2EsyWUloftbada53L60dkz4H4_BaHogfnVh8anTUb5s7v/exec";

  // ============================================================
  // HELPER: API CALL (with timeout & retry)
  // ============================================================
  async function callApi(params, retries = 1) {
    const url = new URL(API_BASE_URL);
    Object.keys(params).forEach(key => url.searchParams.append(key, params[key]));

    for (let attempt = 0; attempt <= retries; attempt++) {
      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 12000);
        const response = await fetch(url.toString(), {
          method: 'GET',
          mode: 'cors',
          cache: 'no-cache',
          signal: controller.signal
        });
        clearTimeout(timeoutId);
        const text = await response.text();
        try {
          return JSON.parse(text);
        } catch (e) {
          return { success: false, msg: "Invalid server response" };
        }
      } catch (err) {
        if (attempt === retries) {
          return { success: false, msg: err.message || "Network error" };
        }
        await new Promise(r => setTimeout(r, 800));
      }
    }
  }

  // ============================================================
  // SIMPLE HASH (consistent, no backend changes)
  // ============================================================
  function simpleHash(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) {
      hash = ((hash << 5) - hash) + str.charCodeAt(i);
      hash |= 0;
    }
    return btoa(str + "_" + Math.abs(hash));
  }

  // ============================================================
  // CORE BUSINESS LOGIC (ALL FRONTEND)
  // ============================================================
  let currentUser = null;       // stores session
  let activeAuthMode = "login"; // 'login' or 'register'

  // --- Backend helpers (using generic SAVE_USER / GET_USER) ---
  async function saveUserToBackend(userObj) {
    return await callApi({
      action: "SAVE_USER",
      userData: JSON.stringify(userObj)
    });
  }

  async function loadUserFromBackend(email) {
    const res = await callApi({ action: "GET_USER", email: email.toLowerCase().trim() });
    if (res.success && res.uid) {
      return {
        uid: res.uid,
        email: res.email,
        password: res.password,
        balance: Number(res.balance) || 0,
        role: res.role || "user",
        lastMine: res.lastMine || "",
        createdAt: res.createdAt || ""
      };
    }
    return null;
  }

  async function addLogEntry(actionType, uid, email, details) {
    await callApi({
      action: "ADD_LOG",
      actionType: actionType,
      uid: uid || "",
      email: email || "",
      details: details || ""
    });
  }

  // --- Register logic ---
  async function registerUser(email, password) {
    email = email.trim().toLowerCase();
    password = password.trim();
    if (!email || !password) return { ok: false, msg: "Email and password required" };
    if (!email.includes("@")) return { ok: false, msg: "Enter a valid email" };
    if (password.length < 4) return { ok: false, msg: "Password must be at least 4 characters" };

    const existing = await loadUserFromBackend(email);
    if (existing) return { ok: false, msg: "Email already registered" };

    const hashedPass = simpleHash(password);
    const newUser = {
      email: email,
      password: hashedPass,
      balance: 0,
      role: email === "admin@nexus.com" ? "admin" : "user",
      lastMine: "",
      createdAt: new Date().toISOString()
    };

    const result = await saveUserToBackend(newUser);
    if (result.success) {
      await addLogEntry("REGISTER", result.uid, email, "New registration");
      return { ok: true, msg: "Registration successful! Please login." };
    }
    return { ok: false, msg: "Registration failed. Try again." };
  }

  // --- Login logic ---
  async function loginUser(email, password) {
    email = email.trim().toLowerCase();
    password = password.trim();
    const hashedPass = simpleHash(password);

    const user = await loadUserFromBackend(email);
    if (!user) return { ok: false, msg: "User not found" };
    if (user.password === hashedPass) {
      await addLogEntry("LOGIN", user.uid, email, "User logged in");
      return { ok: true, user: user };
    }
    return { ok: false, msg: "Invalid password" };
  }

  // --- Mining logic (cooldown + reward) ---
  const REWARD = 0.2;
  const COOLDOWN_HOURS = 24;

  async function performMining(user) {
    const now = Date.now();
    const lastMineTime = user.lastMine ? new Date(user.lastMine).getTime() : 0;
    const hoursSince = (now - lastMineTime) / (1000 * 60 * 60);

    if (lastMineTime > 0 && hoursSince < COOLDOWN_HOURS) {
      const remaining = (COOLDOWN_HOURS - hoursSince).toFixed(1);
      return { ok: false, msg: `⏰ Cooldown active: ${remaining} hours left` };
    }

    const newBalance = user.balance + REWARD;
    const updatedUser = {
      email: user.email,
      password: user.password,
      balance: newBalance,
      role: user.role,
      lastMine: new Date().toISOString(),
      createdAt: user.createdAt
    };

    const saveRes = await saveUserToBackend(updatedUser);
    if (saveRes.success) {
      await addLogEntry("MINE", user.uid, user.email, `Mined ${REWARD} NXM`);
      return { ok: true, newBalance: newBalance, reward: REWARD };
    }
    return { ok: false, msg: "Mining failed, please retry" };
  }

  // --- Admin broadcast (just logs, fully frontend) ---
  async function adminBroadcast(user, message) {
    if (user.role !== "admin") return { ok: false, msg: "Admin only" };
    await addLogEntry("BROADCAST", user.uid, user.email, `📢 ${message}`);
    return { ok: true, msg: "Broadcast sent to network" };
  }

  // ============================================================
  // UI RENDERING (no backend changes ever)
  // ============================================================
  function render() {
    const panel = document.getElementById("dynamicPanel");
    if (!currentUser) {
      renderAuthScreen(panel);
    } else {
      renderDashboard(panel);
    }
  }

  function renderAuthScreen(container) {
    container.innerHTML = `
      <div class="card">
        <div class="toggle-group">
          <button class="toggle-btn ${activeAuthMode === 'login' ? 'active' : ''}" id="loginTabBtn">🔐 LOGIN</button>
          <button class="toggle-btn ${activeAuthMode === 'register' ? 'active' : ''}" id="registerTabBtn">📝 REGISTER</button>
        </div>
        <div class="input-group">
          <label>📧 EMAIL</label>
          <input type="email" id="authEmail" placeholder="miner@example.com" autocomplete="email">
        </div>
        <div class="input-group">
          <label>🔒 PASSWORD</label>
          <input type="password" id="authPassword" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button id="submitAuthBtn">${activeAuthMode === 'login' ? '⚡ LOGIN' : '✨ CREATE ACCOUNT'}</button>
        <div id="authMessage" class="message"></div>
      </div>
    `;

    document.getElementById("loginTabBtn")?.addEventListener("click", () => {
      activeAuthMode = "login";
      render();
    });
    document.getElementById("registerTabBtn")?.addEventListener("click", () => {
      activeAuthMode = "register";
      render();
    });

    const submitBtn = document.getElementById("submitAuthBtn");
    const emailInp = document.getElementById("authEmail");
    const pwdInp = document.getElementById("authPassword");
    const msgDiv = document.getElementById("authMessage");

    submitBtn.onclick = async () => {
      const email = emailInp.value;
      const password = pwdInp.value;
      msgDiv.innerHTML = '<span class="info-msg">⏳ Processing...</span>';

      if (activeAuthMode === "login") {
        const result = await loginUser(email, password);
        if (result.ok) {
          currentUser = result.user;
          render();
        } else {
          msgDiv.innerHTML = `<span class="error-msg">❌ ${result.msg}</span>`;
        }
      } else {
        const result = await registerUser(email, password);
        if (result.ok) {
          msgDiv.innerHTML = `<span class="success-msg">✅ ${result.msg}</span>`;
          emailInp.value = "";
          pwdInp.value = "";
          activeAuthMode = "login";
          render();
        } else {
          msgDiv.innerHTML = `<span class="error-msg">❌ ${result.msg}</span>`;
        }
      }
    };
  }

  async function renderDashboard(container) {
    // refresh latest data from backend
    const fresh = await loadUserFromBackend(currentUser.email);
    if (fresh) currentUser = fresh;

    const isAdmin = currentUser.role === "admin";
    const lastMineTime = currentUser.lastMine ? new Date(currentUser.lastMine).getTime() : 0;
    const now = Date.now();
    const canMine = !lastMineTime || (now - lastMineTime) >= (COOLDOWN_HOURS * 3600000);
    const hoursLeft = !canMine ? ((COOLDOWN_HOURS * 3600000 - (now - lastMineTime)) / 3600000).toFixed(1) : 0;

    container.innerHTML = `
      <div class="card">
        <div class="stat-row">
          <span class="stat-label">💎 WALLET</span>
          <span class="stat-value">${escapeHtml(currentUser.email)}</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">🆔 MINER ID</span>
          <span class="stat-value" style="font-size:0.7rem;">${currentUser.uid}</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">💰 BALANCE</span>
          <span class="stat-value glow-text" id="balanceValue">${currentUser.balance.toFixed(4)} NXM</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">⭐ ROLE</span>
          <span class="stat-value"><span class="badge ${isAdmin ? 'badge-admin' : 'badge-user'}">${isAdmin ? 'ADMIN' : 'MINER'}</span></span>
        </div>
      </div>

      <div class="card">
        <div class="mining-animation" id="miningAnim">⛏️ 💎 ⛏️</div>
        <button class="mine-btn" id="mineActionBtn" ${!canMine ? 'disabled' : ''}>
          ${canMine ? '⚡ START MINING (+0.2 NXM)' : `⏰ COOLDOWN (${hoursLeft}h)`}
        </button>
        <div id="mineFeedback" class="message"></div>
      </div>

      ${isAdmin ? `
      <div class="card">
        <div style="font-weight:bold; margin-bottom:14px;">📢 ADMIN BROADCAST</div>
        <div class="input-group">
          <textarea id="broadcastMessage" rows="2" placeholder="Announcement to all miners..."></textarea>
        </div>
        <button id="sendBroadcastBtn">📡 SEND TO NETWORK</button>
        <div id="broadcastStatus" class="message"></div>
      </div>
      ` : ''}

      <button id="logoutButton">🚪 DISCONNECT WALLET</button>
    `;

    // Mining action
    const mineBtn = document.getElementById("mineActionBtn");
    const animDiv = document.getElementById("miningAnim");
    const mineMsgDiv = document.getElementById("mineFeedback");

    mineBtn?.addEventListener("click", async () => {
      if (!currentUser) return;
      mineBtn.disabled = true;
      animDiv.innerHTML = "🌀 MINING IN PROGRESS 🌀";
      mineMsgDiv.innerHTML = '<span class="info-msg">⛏️ Hashing proof-of-work...</span>';

      const result = await performMining(currentUser);
      if (result.ok) {
        currentUser.balance = result.newBalance;
        document.getElementById("balanceValue").innerHTML = result.newBalance.toFixed(4) + " NXM";
        animDiv.innerHTML = `✅ +${result.reward} NXM MINED! ✅`;
        mineMsgDiv.innerHTML = `<span class="success-msg">✅ Mining successful! +${result.reward} NXM</span>`;
        setTimeout(() => render(), 1800);
      } else {
        animDiv.innerHTML = "⛏️ 💎 ⛏️";
        mineMsgDiv.innerHTML = `<span class="error-msg">❌ ${result.msg}</span>`;
        mineBtn.disabled = false;
        if (result.msg.includes("Cooldown")) {
          setTimeout(() => render(), 2000);
        }
      }
    });

    // Admin broadcast
    if (isAdmin) {
      const broadcastBtn = document.getElementById("sendBroadcastBtn");
      const broadcastInput = document.getElementById("broadcastMessage");
      const broadcastStatusDiv = document.getElementById("broadcastStatus");
      broadcastBtn?.addEventListener("click", async () => {
        const msg = broadcastInput.value.trim();
        if (!msg) {
          broadcastStatusDiv.innerHTML = '<span class="error-msg">❌ Enter a message</span>';
          return;
        }
        const res = await adminBroadcast(currentUser, msg);
        if (res.ok) {
          broadcastStatusDiv.innerHTML = `<span class="success-msg">✅ ${res.msg}</span>`;
          broadcastInput.value = "";
          setTimeout(() => (broadcastStatusDiv.innerHTML = ""), 3000);
        } else {
          broadcastStatusDiv.innerHTML = `<span class="error-msg">❌ ${res.msg}</span>`;
        }
      });
    }

    // Logout
    document.getElementById("logoutButton")?.addEventListener("click", () => {
      currentUser = null;
      render();
    });
  }

  // simple escape helper
  function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/[&<>]/g, function(m) {
      if (m === "&") return "&amp;";
      if (m === "<") return "&lt;";
      if (m === ">") return "&gt;";
      return m;
    });
  }

  // ============================================================
  // CONNECTION TEST & START
  // ============================================================
  async function initApp() {
    const panel = document.getElementById("dynamicPanel");
    const testResponse = await callApi({ action: "PING" });
    if (!testResponse || !testResponse.success) {
      panel.innerHTML = `
        <div class="card">
          <div class="message error-msg">
            ⚠️ Cannot reach mining network.<br><br>
            <strong>Possible fixes:</strong><br>
            • Redeploy Apps Script with "Anyone" access<br>
            • Wait 2 min after deployment<br>
            • Check if URL is correct<br><br>
            <span style="font-size:0.7rem;">URL: ${API_BASE_URL.substring(0, 70)}...</span>
          </div>
        </div>
      `;
      return;
    }
    render();
  }

  initApp();
</script>
</body>
</html>
