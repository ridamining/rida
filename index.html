<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rida Network Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
body { background-color: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', sans-serif; }
.navbar, .footer { background-color: #161b22; }
.sidebar { background-color: #161b22; min-height: 100vh; color: #c9d1d9; }
.sidebar a { color: #c9d1d9; text-decoration: none; display: block; padding: 10px; }
.sidebar a.active, .sidebar a:hover { background-color: #238636; color: #fff; }
.card { background-color: #21262d; border: none; }
.btn-primary { background-color: #238636; border: none; }
</style>
</head>
<body>

<div class="d-flex">
  <!-- Sidebar -->
  <div class="sidebar p-3">
    <h3>Rida Network</h3>
    <a href="#" id="nav-dashboard" class="active"><i class="fa fa-tachometer-alt"></i> Dashboard</a>
    <a href="#" id="nav-mine"><i class="fa fa-cogs"></i> Mine</a>
    <a href="#" id="nav-profile"><i class="fa fa-user"></i> Profile</a>
    <a href="#" id="nav-admin" style="display:none;"><i class="fa fa-shield-alt"></i> Admin Panel</a>
    <a href="#" id="nav-logout"><i class="fa fa-sign-out-alt"></i> Logout</a>
  </div>

  <!-- Main Content -->
  <div class="flex-grow-1 p-4">
    <div id="login-section">
      <h2>Login to Rida Network</h2>
      <div class="mb-3">
        <input type="email" id="email" class="form-control" placeholder="Email">
      </div>
      <div class="mb-3">
        <input type="password" id="password" class="form-control" placeholder="Password">
      </div>
      <button id="login-btn" class="btn btn-primary">Login</button>
      <button id="register-btn" class="btn btn-secondary">Register</button>
      <div id="login-msg" class="mt-2 text-danger"></div>
    </div>

    <div id="dashboard-section" style="display:none;">
      <h2>Dashboard</h2>
      <p>Welcome, <span id="user-email"></span> | Balance: <span id="user-balance">0</span> Rida</p>
      <button id="start-mine" class="btn btn-success mb-3">Start Mining</button>
      <div id="mine-msg" class="mt-2"></div>

      <div id="admin-panel" style="display:none;">
        <h3>Admin Broadcast</h3>
        <textarea id="broadcast-msg" class="form-control mb-2" placeholder="Enter message"></textarea>
        <button id="broadcast-btn" class="btn btn-warning">Send Broadcast</button>
        <div id="broadcast-msg-status" class="mt-2"></div>
      </div>

      <h3>Recent Users</h3>
      <table class="table table-dark table-striped" id="users-table">
        <thead>
          <tr><th>UID</th><th>Email</th><th>Role</th><th>Balance</th><th>Last Mine</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwC9-uCn1X-NBQGiWiI8caBqpfY0dsIHTomlOpVKrtgdpvbrtJhLkYd7uiiOcf4TeG6/exec";
let currentUser = null;

// ---------- Helper ----------
async function callAPI(params) {
  const url = new URL(API_URL);
  Object.keys(params).forEach(k => url.searchParams.append(k, params[k]));
  const res = await fetch(url).then(r => r.json());
  return res;
}

// ---------- Login ----------
document.getElementById("login-btn").onclick = async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const res = await callAPI({ action: "LOGIN", email, password });
  if(res.success){
    currentUser = res;
    showDashboard();
  } else {
    document.getElementById("login-msg").innerText = res.msg;
  }
};

// ---------- Register ----------
document.getElementById("register-btn").onclick = async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const res = await callAPI({ action: "REGISTER", email, password });
  if(res.success){
    document.getElementById("login-msg").innerText = "Registered! Please login.";
  } else {
    document.getElementById("login-msg").innerText = res.msg;
  }
};

// ---------- Dashboard ----------
function showDashboard(){
  document.getElementById("login-section").style.display="none";
  document.getElementById("dashboard-section").style.display="block";
  document.getElementById("user-email").innerText = currentUser.uid;
  document.getElementById("user-balance").innerText = currentUser.balance || 0;

  if(currentUser.role === "admin") document.getElementById("admin-panel").style.display="block";

  loadUsers();
}

// ---------- Logout ----------
document.getElementById("nav-logout").onclick = () => location.reload();

// ---------- Mining ----------
document.getElementById("start-mine").onclick = async () => {
  const res = await callAPI({ action: "MINE", uid: currentUser.uid });
  document.getElementById("mine-msg").innerText = res.msg;
  if(res.success) document.getElementById("user-balance").innerText = res.balance;
};

// ---------- Broadcast ----------
document.getElementById("broadcast-btn").onclick = async () => {
  const msg = document.getElementById("broadcast-msg").value;
  const res = await callAPI({ action: "BROADCAST", message: msg });
  document.getElementById("broadcast-msg-status").innerText = res.msg;
  document.getElementById("broadcast-msg").value = "";
};

// ---------- Load Users (Admin) ----------
async function loadUsers(){
  if(currentUser.role !== "admin") return;
  const res = await callAPI({ action: "GETALL" });
  const tbody = document.querySelector("#users-table tbody");
  tbody.innerHTML = "";
  res.users.forEach(u => {
    const tr = document.createElement("tr");
    tr.innerHTML = `<td>${u.UID}</td><td>${u.Email}</td><td>${u.Role}</td><td>${u.Balance}</td><td>${u.LastMine || ""}</td>`;
    tbody.appendChild(tr);
  });
}
</script>

</body>
</html>
