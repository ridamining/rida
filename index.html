<script>
const API = "https://script.google.com/macros/s/AKfycbz9WrOIa_rAuS3bkbx0RhocemlHb-MlynWdpxRevVi313FoonK9ZLiWFx1-ZpxvFKPg/exec"; 

let user = JSON.parse(localStorage.getItem("user"));

// ================= TOGGLE =================
function toggle() {
    document.getElementById('login-box').classList.toggle('hidden');
    document.getElementById('reg-box').classList.toggle('hidden');
}

// ================= AUTH =================
async function handleAuth(type) {
    const data = type === 'login' ? 
        {
            action: 'login',
            email: document.getElementById('email').value,
            password: document.getElementById('pass').value
        } :
        {
            action: 'register',
            username: document.getElementById('r-user').value,
            email: document.getElementById('r-email').value,
            password: document.getElementById('r-pass').value,
            referredBy: document.getElementById('r-ref').value
        };

    try {
        const res = await fetch(API, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        const result = await res.json();

        // ===== REGISTER =====
        if (type === 'register') {
            if (result.status === "success") {
                alert("Registered Successfully ✅");
                toggle();
            } else if (result.status === "exists") {
                alert("Email already exists ❌");
            } else {
                alert("Registration failed ❌");
            }
        }

        // ===== LOGIN =====
        if (type === 'login') {
            if (result.status === "success") {
                localStorage.setItem("user", JSON.stringify(result.data));
                loadDashboard();
            } else {
                alert("Invalid login ❌");
            }
        }

    } catch (err) {
        console.error(err);
        alert("Server error ❌");
    }
}

// ================= LOAD DASHBOARD =================
function loadDashboard() {
    user = JSON.parse(localStorage.getItem("user"));

    if (!user) return;

    document.getElementById('auth-screen').classList.add('hidden');
    document.getElementById('dash-screen').classList.remove('hidden');

    document.getElementById('disp-user').innerText = user.username;
    document.getElementById('disp-ref').innerText = "REF: " + user.refCode;
    document.getElementById('disp-bal').innerText = user.balance;
    document.getElementById('disp-rcnt').innerText = user.refCount;
}

// ================= AUTO LOGIN =================
window.onload = function () {
    if (user) {
        loadDashboard();
    }
};

// ================= MINING =================
async function mineNow() {
    if (!user) return;

    await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            action: 'mine',
            username: user.username
        })
    });

    alert("Mining request sent ⛏️");
}

// ================= LOGOUT =================
function logout() {
    localStorage.removeItem("user");
    location.reload();
}
</script>
