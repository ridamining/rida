<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rida Network | Pro Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
body { font-family: 'Plus Jakarta Sans', sans-serif; background: #010409; color: white; margin: 0; }
.hidden { display: none !important; }
.glass { background: rgba(13, 17, 23, 0.9); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.05); }
.btn { transition: all 0.2s ease; cursor: pointer; }
.btn:hover { transform: scale(1.02); }
</style>
</head>
<body class="min-h-screen">

<!-- LOGIN / REGISTER -->
<div id="auth-section" class="flex items-center justify-center min-h-screen p-6">
    <div class="glass w-full max-w-sm p-10 rounded-3xl text-center space-y-4">
        <h1 class="text-4xl font-bold text-blue-500 italic mb-4">Rida Network</h1>
        <input type="email" id="email" class="w-full p-4 rounded-xl bg-white/10 border border-white/20 text-white" placeholder="Email">
        <input type="password" id="password" class="w-full p-4 rounded-xl bg-white/10 border border-white/20 text-white" placeholder="Password">
        <button id="login-btn" class="btn w-full py-4 rounded-xl bg-blue-600 font-bold uppercase">Login</button>
        <button id="register-btn" class="btn w-full py-4 rounded-xl bg-green-600 font-bold uppercase">Register</button>
        <p id="auth-msg" class="text-red-500 text-sm mt-2"></p>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard-section" class="hidden min-h-screen p-6">
    <header class="flex justify-between items-center glass p-6 rounded-2xl mb-6">
        <h2 class="text-xl font-bold italic">Rida Network Dashboard</h2>
        <button onclick="logout()" class="p-2 bg-red-500/20 rounded-xl text-red-400"><i data-lucide="log-out"></i></button>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
        <div class="glass p-6 rounded-2xl">
            <h3 class="text-sm text-blue-400 uppercase font-bold mb-2">Email</h3>
            <p id="user-email" class="font-semibold">loading...</p>
        </div>
        <div class="glass p-6 rounded-2xl">
            <h3 class="text-sm text-blue-400 uppercase font-bold mb-2">Role</h3>
            <p id="user-role" class="font-semibold">loading...</p>
        </div>
        <div class="glass p-6 rounded-2xl">
            <h3 class="text-sm text-blue-400 uppercase font-bold mb-2">Balance</h3>
            <p id="user-balance" class="font-semibold">0.000000</p>
        </div>
    </div>

    <div class="glass p-6 rounded-2xl text-center">
        <button id="mine-btn" class="btn w-full py-4 bg-blue-600 font-bold uppercase">Start Mining</button>
        <p id="mine-msg" class="text-green-400 mt-2"></p>
    </div>

    <!-- Admin Broadcast Panel -->
    <div id="admin-panel" class="hidden glass p-6 rounded-2xl mt-6">
        <h3 class="text-lg font-bold mb-2">Admin Broadcast</h3>
        <input type="text" id="broadcast-msg" class="w-full p-3 rounded-xl bg-white/10 border border-white/20 text-white" placeholder="Message to all users">
        <button id="broadcast-btn" class="btn w-full mt-2 py-3 bg-purple-600 font-bold uppercase">Send Broadcast</button>
        <p id="broadcast-status" class="text-green-400 mt-2"></p>
    </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwfjeDF7ZZDvb3BRKSYuTYj5KZgwTW0f0gRETlE1ST6ej3E5uOinhf93Cn1g6u9DXjk/exec";

let currentUser = null;

// Initialize UI
document.getElementById('dashboard-section').style.display = 'none';
document.getElementById('auth-section').style.display = 'block';

async function loginUser(){
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();
    if(!email || !password){ document.getElementById('auth-msg').innerText="All fields required."; return; }

    const res = await fetch(`${API_URL}?action=LOGIN&email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`);
    const data = await res.json();

    if(data.success){
        currentUser = data.data;
        document.getElementById('auth-section').style.display = 'none';
        document.getElementById('dashboard-section').style.display = 'block';
        document.getElementById('user-email').innerText = currentUser.email;
        document.getElementById('user-role').innerText = currentUser.role;
        document.getElementById('user-balance').innerText = parseFloat(currentUser.balance).toFixed(6);

        if(currentUser.role === 'admin'){
            document.getElementById('admin-panel').style.display = 'block';
        }
    } else {
        document.getElementById('auth-msg').innerText = data.msg;
    }
}

async function registerUser(){
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();
    if(!email || !password){ document.getElementById('auth-msg').innerText="All fields required."; return; }

    const res = await fetch(`${API_URL}?action=REGISTER&email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`);
    const data = await res.json();
    document.getElementById('auth-msg').innerText = data.msg;
    if(data.success) loginUser();
}

async function startMining(){
    if(!currentUser) return;
    document.getElementById('mine-btn').disabled = true;

    const res = await fetch(`${API_URL}?action=MINE&email=${encodeURIComponent(currentUser.email)}`);
    const data = await res.json();

    if(data.success){
        currentUser.balance = data.newBalance;
        document.getElementById('user-balance').innerText = parseFloat(currentUser.balance).toFixed(6);
        document.getElementById('mine-msg').innerText = "Mining completed! +0.2 Rida";
    } else {
        document.getElementById('mine-msg').innerText = data.msg;
    }
    setTimeout(()=>{ document.getElementById('mine-btn').disabled=false; document.getElementById('mine-msg').innerText=""; }, 3000);
}

async function sendBroadcast(){
    const msg = document.getElementById('broadcast-msg').value.trim();
    if(!msg) return;
    const res = await fetch(`${API_URL}?action=BROADCAST&message=${encodeURIComponent(msg)}`);
    const data = await res.json();
    document.getElementById('broadcast-status').innerText = data.msg;
}

function logout(){
    currentUser=null;
    document.getElementById('dashboard-section').style.display='none';
    document.getElementById('auth-section').style.display='block';
}

// Event listeners
document.getElementById('login-btn').onclick = loginUser;
document.getElementById('register-btn').onclick = registerUser;
document.getElementById('mine-btn').onclick = startMining;
document.getElementById('broadcast-btn').onclick = sendBroadcast;

lucide.createIcons();
</script>
</body>
</html>
