<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIDA Mining | Premium Cloud Mining</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #0f172a; 
            color: white; 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden;
        }
        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 28px; 
        }
        .btn-primary { 
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .btn-primary:hover:not(:disabled) { 
            transform: translateY(-2px); 
            box-shadow: 0 12px 24px -6px rgba(37, 99, 235, 0.5); 
        }
        .btn-primary:active { transform: scale(0.98); }
        .neon-text { text-shadow: 0 0 15px rgba(59, 130, 246, 0.6); }
        .hidden-view { display: none; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }

        input { transition: all 0.2s ease; }
        input:focus { box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.4); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-start p-4 md:p-8">

    <div id="authView" class="w-full max-w-md mt-12 animate-in fade-in duration-700">
        <div class="text-center mb-10">
            <h1 class="text-5xl font-extrabold tracking-tighter neon-text italic italic">RIDA</h1>
            <p class="text-slate-500 font-medium tracking-widest uppercase text-xs mt-2">Secure Mining Protocol</p>
        </div>

        <div class="glass p-8 shadow-2xl">
            <div class="flex gap-4 mb-8 bg-slate-900/50 p-1 rounded-2xl">
                <button onclick="switchAuth('login')" id="btnTabLogin" class="flex-1 py-3 rounded-xl font-bold transition-all text-blue-400 bg-slate-800">Login</button>
                <button onclick="switchAuth('reg')" id="btnTabReg" class="flex-1 py-3 rounded-xl font-bold transition-all text-slate-500">Register</button>
            </div>

            <form id="authForm" onsubmit="handleAuth(event)" class="space-y-4">
                <div id="regFields" class="hidden-view">
                    <input type="text" id="username" placeholder="Username" class="w-full bg-slate-900/80 border border-slate-700 rounded-xl p-4 text-white placeholder-slate-500 outline-none">
                </div>
                <input type="email" id="email" placeholder="Email Address" required class="w-full bg-slate-900/80 border border-slate-700 rounded-xl p-4 text-white placeholder-slate-500 outline-none">
                <input type="password" id="password" placeholder="Password" required class="w-full bg-slate-900/80 border border-slate-700 rounded-xl p-4 text-white placeholder-slate-500 outline-none">
                <div id="regFieldsRef" class="hidden-view">
                    <input type="text" id="referredBy" placeholder="Referral Code (Optional)" class="w-full bg-slate-900/80 border border-slate-700 rounded-xl p-4 text-white placeholder-slate-500 outline-none">
                </div>
                <button type="submit" id="authSubmit" class="w-full btn-primary py-4 rounded-xl font-bold text-lg shadow-lg">SIGN IN</button>
            </form>
        </div>
    </div>

    <div id="dashView" class="w-full max-w-lg hidden-view space-y-6 animate-in slide-in-from-bottom duration-500">
        <div class="flex justify-between items-center px-2">
            <div>
                <p class="text-slate-500 text-xs font-bold uppercase tracking-widest">Operator</p>
                <h2 id="dashUser" class="text-xl font-bold text-white italic">...</h2>
            </div>
            <button onclick="logout()" class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center text-slate-400 hover:text-red-400 transition-colors">
                <i class="fas fa-power-off"></i>
            </button>
        </div>

        <div class="glass p-8 text-center relative overflow-hidden group">
            <div class="absolute -right-8 -top-8 w-32 h-32 bg-blue-600/10 rounded-full blur-3xl group-hover:bg-blue-600/20 transition-all"></div>
            <p class="text-slate-400 text-sm font-medium mb-1">Available RIDA Balance</p>
            <h2 class="text-6xl font-black neon-text tracking-tighter inline-block">
                <span id="dashBalance">0.00</span>
            </h2>
            <span class="text-blue-500 font-bold ml-2">RIDA</span>
        </div>

        <div class="glass p-8 text-center border-t border-blue-500/20">
            <div id="mineStatus" class="mb-6 text-sm font-bold text-blue-400/80 uppercase tracking-widest">System Ready</div>
            <div class="relative inline-block">
                <button id="mineBtn" onclick="startMining()" class="w-36 h-36 rounded-full btn-primary shadow-2xl flex items-center justify-center mx-auto mb-6 border-[10px] border-slate-900">
                    <i class="fas fa-microchip text-5xl"></i>
                </button>
            </div>
            <div id="timer" class="text-3xl font-mono font-light tracking-widest text-slate-300">00:00:00</div>
            <p class="text-xs text-slate-500 mt-2">Next mining cycle available in 24 hours</p>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="glass p-5 border-l-4 border-blue-500">
                <p class="text-[10px] text-slate-500 uppercase font-bold mb-1">Your Code</p>
                <p id="dashRefCode" class="text-lg font-mono font-bold text-white tracking-wider">---</p>
            </div>
            <div class="glass p-5 border-l-4 border-emerald-500">
                <p class="text-[10px] text-slate-500 uppercase font-bold mb-1">Network Size</p>
                <p id="dashRefCount" class="text-lg font-bold text-white"><span class="text-emerald-400">0</span> Users</p>
            </div>
        </div>

        <div class="glass p-6">
            <h3 class="font-bold text-sm mb-4 flex items-center gap-2 text-slate-300 uppercase tracking-wider">
                <i class="fas fa-broadcast-tower text-blue-500"></i> Announcements
            </h3>
            <div id="annList" class="space-y-4 max-h-48 overflow-y-auto pr-2">
                <p class="text-slate-600 text-sm italic">Initializing news feed...</p>
            </div>
        </div>
    </div>

    <div id="loader" class="fixed inset-0 bg-slate-950/90 hidden-view flex flex-col items-center justify-center z-50">
        <div class="w-16 h-16 border-4 border-blue-500/20 border-t-blue-500 rounded-full animate-spin"></div>
        <p class="mt-4 text-blue-500 font-bold tracking-widest animate-pulse text-xs uppercase">Connecting to Blockchain...</p>
    </div>

    <script>
        // CONFIGURATION
        const API_URL = "https://script.google.com/macros/s/AKfycbzB1PNeibAnLFM3FzQQR_SBQbLenjU256yJdaiJvVhwrIjLs-U_5aGOqkuD5HJkFVpj1A/exec";

        let currentUser = JSON.parse(localStorage.getItem('rida_user'));
        let isRegister = false;
        let lastMineTimestamp = 0;

        window.onload = () => {
            if(currentUser) {
                showDashboard();
            }
        };

        function switchAuth(type) {
            isRegister = type === 'reg';
            document.getElementById('regFields').classList.toggle('hidden-view', !isRegister);
            document.getElementById('regFieldsRef').classList.toggle('hidden-view', !isRegister);
            document.getElementById('authSubmit').innerText = isRegister ? 'CREATE ACCOUNT' : 'SIGN IN';
            
            // Tab UI
            const loginTab = document.getElementById('btnTabLogin');
            const regTab = document.getElementById('btnTabReg');
            if(isRegister) {
                regTab.classList.add('bg-slate-800', 'text-blue-400');
                regTab.classList.remove('text-slate-500');
                loginTab.classList.remove('bg-slate-800', 'text-blue-400');
                loginTab.classList.add('text-slate-500');
            } else {
                loginTab.classList.add('bg-slate-800', 'text-blue-400');
                loginTab.classList.remove('text-slate-500');
                regTab.classList.remove('bg-slate-800', 'text-blue-400');
                regTab.classList.add('text-slate-500');
            }
        }

        async function handleAuth(e) {
            e.preventDefault();
            toggleLoader(true);
            
            const payload = {
                action: isRegister ? 'register' : 'login',
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                username: document.getElementById('username').value,
                referredBy: document.getElementById('referredBy').value
            };

            const res = await callAPI(payload);
            toggleLoader(false);

            if(res.success) {
                if(isRegister) {
                    alert("Success! Account created. Please sign in.");
                    switchAuth('login');
                } else {
                    localStorage.setItem('rida_user', JSON.stringify(res.user));
                    currentUser = res.user;
                    showDashboard();
                }
            } else {
                alert("Error: " + res.message);
            }
        }

        async function showDashboard() {
            document.getElementById('authView').classList.add('hidden-view');
            document.getElementById('dashView').classList.remove('hidden-view');
            await refreshUserData();
            loadAnnouncements();
            setInterval(updateTimer, 1000);
        }

        async function refreshUserData() {
            const res = await callAPI({ action: 'getUser', email: currentUser.email });
            if(res.success) {
                document.getElementById('dashUser').innerText = res.data.username;
                document.getElementById('dashBalance').innerText = parseFloat(res.data.balance).toFixed(2);
                document.getElementById('dashRefCode').innerText = res.data.refCode;
                document.getElementById('dashRefCount').innerHTML = `<span class="text-emerald-400">${res.data.refCount}</span> Users`;
                lastMineTimestamp = parseInt(res.data.lastMine);
            }
        }

        async function startMining() {
            toggleLoader(true);
            const res = await callAPI({ action: 'mine', email: currentUser.email });
            toggleLoader(false);
            
            if(res.success) {
                await refreshUserData();
            } else {
                alert(res.message);
            }
        }

        async function loadAnnouncements() {
            const res = await callAPI({ action: 'getAnnouncements' });
            const container = document.getElementById('annList');
            if(res.success && res.data.length > 0) {
                container.innerHTML = res.data.map(item => `
                    <div class="bg-slate-900/40 p-4 rounded-xl border border-slate-800">
                        <div class="flex justify-between items-start mb-1">
                            <h4 class="text-blue-400 font-bold text-sm">${item.title}</h4>
                            <span class="text-[10px] text-slate-500">${new Date(item.date).toLocaleDateString()}</span>
                        </div>
                        <p class="text-xs text-slate-400 leading-relaxed">${item.msg}</p>
                    </div>
                `).join('');
            } else {
                container.innerHTML = '<p class="text-slate-600 text-xs italic">No system updates available.</p>';
            }
        }

        function updateTimer() {
            if(!lastMineTimestamp) return;
            
            const now = new Date().getTime();
            const COOLDOWN = 24 * 60 * 60 * 1000;
            const diff = COOLDOWN - (now - lastMineTimestamp);
            
            const btn = document.getElementById('mineBtn');
            const status = document.getElementById('mineStatus');
            const timerDisplay = document.getElementById('timer');

            if(diff > 0) {
                const h = Math.floor(diff / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                
                timerDisplay.innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                btn.disabled = true;
                btn.classList.add('opacity-40', 'grayscale');
                status.innerText = "MINING IN PROGRESS";
                status.classList.replace('text-blue-400/80', 'text-slate-500');
            } else {
                timerDisplay.innerText = "00:00:00";
                btn.disabled = false;
                btn.classList.remove('opacity-40', 'grayscale');
                status.innerText = "SYSTEM READY TO MINE";
                status.classList.replace('text-slate-500', 'text-blue-400/80');
            }
        }

        async function callAPI(body) {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify(body)
                });
                return await response.json();
            } catch (e) {
                console.error("API Error:", e);
                return { success: false, message: "Network error. Check your connection." };
            }
        }

        function toggleLoader(show) {
            document.getElementById('loader').classList.toggle('hidden-view', !show);
        }

        function logout() {
            if(confirm("Terminate session?")) {
                localStorage.removeItem('rida_user');
                location.reload();
            }
        }
    </script>
</body>
</html>
