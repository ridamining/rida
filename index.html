<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RidaChain Web3 Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap');
        :root { --sky: #38bdf8; --indigo: #6366f1; --admin: #ef4444; }
        body { background: #020617; color: #fff; font-family: 'Outfit', sans-serif; overflow: hidden; height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .btn-prime { background: linear-gradient(135deg, var(--sky) 0%, var(--indigo) 100%); }
        .btn-admin { background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%); }
        .tab-btn.active { color: var(--sky); border-bottom: 2px solid var(--sky); }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="max-w-md mx-auto flex flex-col">

    <header class="p-6 glass flex justify-between items-center">
        <div>
            <h1 class="text-xl font-black italic tracking-tighter">RIDACHAIN <span class="text-sky-400">WEB3</span></h1>
            <p id="role-tag" class="text-[8px] font-bold text-slate-500 uppercase tracking-widest">Network Node</p>
        </div>
        <div id="kyc-status" class="px-3 py-1 rounded-full text-[8px] font-black border border-white/10 uppercase">Checking...</div>
    </header>

    <nav class="flex justify-around glass py-3">
        <button onclick="showTab('ledger')" id="btn-ledger" class="tab-btn active text-[9px] font-black uppercase px-4">Ledger</button>
        <button onclick="showTab('chat')" id="btn-chat" class="tab-btn text-[9px] font-black uppercase px-4">Support</button>
        <button onclick="showTab('kyc')" id="btn-kyc" class="tab-btn text-[9px] font-black uppercase px-4">Verify</button>
        <button onclick="showTab('mgt')" id="btn-mgt" class="tab-btn text-[9px] font-black uppercase px-4 hidden text-red-500">Manage</button>
    </nav>

    <main class="flex-1 overflow-y-auto p-4 pb-20">
        
        <div id="tab-ledger" class="space-y-2">
            <div id="ledger-box"></div>
        </div>

        <div id="tab-chat" class="hidden h-full flex flex-col">
            <div id="chat-win" class="glass rounded-[2rem] p-4 h-[55vh] overflow-y-auto space-y-4 mb-4"></div>
            <div class="flex gap-2">
                <input type="text" id="chat-msg" placeholder="Message..." class="flex-1 bg-white/5 border border-white/10 p-4 rounded-2xl text-xs outline-none">
                <button onclick="sendChat()" class="btn-prime px-6 rounded-2xl"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>

        <div id="tab-kyc" class="hidden space-y-4">
            <div class="glass p-6 rounded-[2.5rem] border-sky-500/20 text-center">
                <h3 class="text-sm font-black uppercase">Standard Verification</h3>
                <p class="text-[10px] opacity-40 mt-2">Send 5 USDT (BSC) to the address below</p>
                <p class="text-[10px] font-mono mt-4 text-sky-400 break-all bg-black/40 p-3 rounded-xl">0xCeC73F7C0e6709eD740Bc8f486fa6623bC0873b3</p>
                <input type="text" id="kyc-tx" placeholder="Transaction Hash" class="w-full mt-4 bg-white/5 border border-white/10 p-4 rounded-xl text-xs outline-none">
                <button onclick="submitKYC()" class="w-full mt-2 btn-prime py-4 rounded-xl text-[10px] font-black uppercase">Submit Proof</button>
            </div>
        </div>

        <div id="tab-mgt" class="hidden space-y-4">
            <h2 class="text-xs font-black text-red-500 uppercase">Pending KYC Requests</h2>
            <div id="admin-kyc-list" class="space-y-2"></div>
            <h2 class="text-xs font-black text-red-500 uppercase mt-6">All Support Tickets</h2>
            <div id="admin-chat-list" class="space-y-2"></div>
        </div>

    </main>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbyT8-zviAVSOYEvyAmRS_Al7Nu1mZjOnE8il7yElhUCJTxPvhFqvbMNxidoJvZL2drI/exec";
        const urlParams = new URLSearchParams(window.location.search);
        const user = {
            uid: urlParams.get('uid') || "GUEST",
            username: urlParams.get('username') || "Anonymous"
        };

        const isAdmin = (user.username === "adminRida" || user.uid === "RIDA-259259");

        window.onload = () => {
            if(isAdmin) {
                document.getElementById('btn-mgt').classList.remove('hidden');
                document.getElementById('role-tag').innerText = "Network Administrator";
                document.getElementById('role-tag').classList.add('text-red-500');
            }
            init();
        };

        async function init() {
            setInterval(genTX, 2000);
            loadStatus();
            if(isAdmin) loadAdminData();
        }

        // --- ADMIN FUNCTIONS ---
        async function loadAdminData() {
            const res = await (await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'adminGetAll' }) })).json();
            if(res.success) {
                // Render KYC
                document.getElementById('admin-kyc-list').innerHTML = res.data.kyc.filter(k => k[4] === 'Pending').map(k => `
                    <div class="glass p-4 rounded-2xl flex justify-between items-center text-[10px]">
                        <div><p class="font-black">${k[2]} (${k[1]})</p><p class="opacity-30">${k[3].substring(0,15)}...</p></div>
                        <button onclick="verifyKYC('${k[1]}')" class="bg-green-500/20 text-green-500 px-3 py-1 rounded-lg font-black uppercase">Approve</button>
                    </div>
                `).join('') || '<p class="text-[8px] opacity-20">No pending requests</p>';
            }
        }

        async function sendChat() {
            const msg = document.getElementById('chat-msg').value;
            if(!msg) return;
            // If admin is typing, they need to specify who they are replying to
            // For now, we simple-send to the sheet.
            await fetch(API, { method: 'POST', body: JSON.stringify({ 
                action: 'sendMessage', uid: user.uid, username: user.username, message: msg 
            }) });
            document.getElementById('chat-msg').value = '';
            loadChat();
        }

        async function loadChat() {
            const res = await (await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'getMessages', uid: user.uid }) })).json();
            const win = document.getElementById('chat-win');
            win.innerHTML = res.data.map(m => `
                <div class="flex ${m[1] === user.uid ? 'justify-end' : 'justify-start'}">
                    <div class="max-w-[85%] px-4 py-2 rounded-2xl ${m[1] === user.uid ? 'btn-prime' : 'bg-white/10'}">
                        <p class="text-[7px] font-black mb-1 opacity-50">${m[2]}</p>
                        <p class="text-xs font-medium">${m[3]}</p>
                    </div>
                </div>
            `).join('');
            win.scrollTop = win.scrollHeight;
        }

        async function loadStatus() {
            const res = await (await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'getKYCStatus', uid: user.uid }) })).json();
            document.getElementById('kyc-status').innerText = res.data;
        }

        async function submitKYC() {
            const hash = document.getElementById('kyc-tx').value;
            if(!hash) return;
            const res = await (await fetch(API, { method: 'POST', body: JSON.stringify({ 
                action: 'submitKYC', uid: user.uid, username: user.username, txHash: hash 
            }) })).json();
            alert(res.msg);
            loadStatus();
        }

        function genTX() {
            const box = document.getElementById('ledger-box');
            const row = `<div class="glass p-3 rounded-xl flex justify-between items-center mb-2 animate-pulse">
                <div class="text-[9px] font-black"><span class="text-sky-400">RIDA-${Math.floor(1000+Math.random()*9000)}</span> → <span class="text-indigo-400">RIDA-${Math.floor(1000+Math.random()*9000)}</span></div>
                <div class="text-[9px] font-black text-green-400">+${(Math.random()*200+10).toFixed(2)} RIDA</div>
            </div>`;
            box.insertAdjacentHTML('afterbegin', row);
            if(box.children.length > 8) box.removeChild(box.lastChild);
        }

        function showTab(t) {
            ['ledger','chat','kyc','mgt'].forEach(tab => {
                document.getElementById('tab-'+tab).classList.add('hidden');
                document.getElementById('btn-'+tab).classList.remove('active');
            });
            document.getElementById('tab-'+t).classList.remove('hidden');
            document.getElementById('btn-'+t).classList.add('active');
            if(t === 'chat') loadChat();
            if(t === 'mgt') loadAdminData();
        }
    </script>
</body>
</html>
