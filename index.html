<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>NexusMine Pro | Crypto Mining Platform</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0a0f1e 0%, #03050b 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      background: rgba(15, 25, 45, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 20px 30px;
      margin-bottom: 20px;
      border: 1px solid rgba(0, 255, 255, 0.3);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .logo h1 {
      font-size: 28px;
      background: linear-gradient(135deg, #00ffcc, #0099ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .logo p {
      font-size: 12px;
      color: #8aa9d1;
    }

    .user-card {
      display: flex;
      align-items: center;
      gap: 20px;
      background: rgba(0, 0, 0, 0.5);
      padding: 10px 20px;
      border-radius: 50px;
    }

    .balance {
      font-size: 20px;
      font-weight: bold;
      color: #00ffcc;
    }

    .role-badge {
      padding: 5px 15px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
    }

    .role-admin {
      background: rgba(183, 110, 255, 0.2);
      color: #b76eff;
      border: 1px solid #b76eff;
    }

    .role-user {
      background: rgba(0, 255, 204, 0.15);
      color: #00ffcc;
      border: 1px solid #00ffcc;
    }

    button {
      background: linear-gradient(95deg, #0e2a3b, #0a1a2f);
      border: 1px solid #00ffcc;
      padding: 10px 20px;
      border-radius: 30px;
      color: #00ffcc;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
    }

    button:hover {
      transform: scale(1.02);
      box-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
    }

    /* Main Layout */
    .dashboard {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 20px;
    }

    @media (max-width: 768px) {
      .dashboard {
        grid-template-columns: 1fr;
      }
    }

    /* Sidebar */
    .sidebar {
      background: rgba(15, 25, 45, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 20px;
      border: 1px solid rgba(0, 255, 255, 0.3);
      height: fit-content;
    }

    .nav-item {
      padding: 12px 16px;
      margin: 8px 0;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      color: #8aa9d1;
    }

    .nav-item:hover {
      background: rgba(0, 255, 204, 0.1);
      color: #00ffcc;
    }

    .nav-item.active {
      background: rgba(0, 255, 204, 0.15);
      color: #00ffcc;
      border-left: 3px solid #00ffcc;
    }

    /* Content */
    .content {
      background: rgba(15, 25, 45, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 25px;
      border: 1px solid rgba(0, 255, 255, 0.3);
      min-height: 500px;
    }

    .card {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .card-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 15px;
      color: #00ffcc;
    }

    /* Forms */
    input, textarea, select {
      width: 100%;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid #2a3a5a;
      padding: 12px;
      border-radius: 12px;
      color: white;
      font-size: 14px;
      margin-bottom: 12px;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: #00ffcc;
    }

    /* Mining */
    .mining-area {
      text-align: center;
      padding: 30px;
    }

    .mining-animation {
      font-size: 60px;
      margin: 20px 0;
    }

    .mine-btn {
      background: radial-gradient(circle at 30% 10%, #ffb347, #ff7e05);
      border: none;
      padding: 15px 40px;
      font-size: 18px;
      font-weight: bold;
      border-radius: 50px;
      color: white;
      cursor: pointer;
      margin-top: 20px;
    }

    .mine-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Tables */
    .table-container {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #2a3a5a;
    }

    th {
      color: #00ffcc;
    }

    /* Chat */
    .chat-container {
      display: flex;
      flex-direction: column;
      height: 450px;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 15px;
    }

    .message {
      margin-bottom: 10px;
      padding: 8px 12px;
      border-radius: 12px;
      max-width: 70%;
    }

    .message-out {
      background: rgba(0, 255, 204, 0.2);
      margin-left: auto;
      color: #00ffcc;
    }

    .message-in {
      background: rgba(255, 255, 255, 0.1);
      color: white;
    }

    .chat-input {
      display: flex;
      gap: 10px;
    }

    .chat-input input {
      flex: 1;
      margin-bottom: 0;
    }

    /* Status badges */
    .status-verified {
      background: rgba(78, 255, 181, 0.2);
      color: #4effb5;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
    }

    .status-unverified {
      background: rgba(255, 94, 126, 0.2);
      color: #ff5e7e;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
    }

    .btn-small {
      padding: 5px 12px;
      font-size: 12px;
      margin: 2px;
    }

    .btn-success {
      border-color: #4effb5;
      color: #4effb5;
    }

    .btn-danger {
      border-color: #ff5e7e;
      color: #ff5e7e;
    }

    .message-text {
      margin-top: 10px;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
    }

    .error {
      color: #ff5e7e;
    }

    .success {
      color: #4effb5;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #8aa9d1;
    }
  </style>
</head>
<body>
<div class="container" id="app"></div>

<script>
// ============================================
// CONFIGURATION
// ============================================
const API_URL = 'https://script.google.com/macros/s/AKfycbzaJ3N8ZQ8f9zwLXlbBL0P-ZurhvLr5za8kIIRRwBR3R8_WKR_3EU1I4Hv16IXpEmOz/exec';

// ============================================
// STATE
// ============================================
let currentUser = null;
let currentPage = 'mining';
let selectedChatUser = null;
let allUsers = [];
let messageInterval = null;

// ============================================
// API HELPER
// ============================================
async function api(action, data = {}) {
  const params = new URLSearchParams({ action, ...data });
  const url = API_URL + '?' + params.toString();
  
  try {
    const response = await fetch(url);
    const result = await response.json();
    return result;
  } catch (error) {
    console.error('API Error:', error);
    return { success: false, msg: error.message };
  }
}

// ============================================
// PASSWORD HASH
// ============================================
function hashPassword(pwd) {
  let hash = 0;
  for (let i = 0; i < pwd.length; i++) {
    hash = ((hash << 5) - hash) + pwd.charCodeAt(i);
    hash = hash & hash;
  }
  return btoa(pwd + '_nexus_' + Math.abs(hash));
}

// ============================================
// USER FUNCTIONS
// ============================================
async function register(email, password) {
  email = email.trim().toLowerCase();
  password = password.trim();
  
  if (!email || !password) return { success: false, msg: 'All fields required' };
  if (password.length < 4) return { success: false, msg: 'Password too short (min 4 characters)' };
  
  const existing = await api('GET_USER', { email });
  if (existing.success) return { success: false, msg: 'Email already exists' };
  
  const result = await api('SAVE_USER', {
    userData: JSON.stringify({
      email: email,
      password: hashPassword(password),
      balance: 100,
      role: email === 'admin@nexus.com' ? 'admin' : 'user',
      status: 'unverified',
      lastMine: '',
      createdAt: new Date().toISOString()
    })
  });
  
  if (result.success) {
    return { success: true, msg: 'Registration successful! Please login.' };
  }
  return { success: false, msg: 'Registration failed' };
}

async function login(email, password) {
  email = email.trim().toLowerCase();
  const user = await api('GET_USER', { email });
  
  if (!user.success) return { success: false, msg: 'User not found' };
  if (user.password === hashPassword(password.trim())) {
    await api('SAVE_USER', {
      userData: JSON.stringify({
        email: user.email,
        lastActive: new Date().toISOString()
      })
    });
    return { success: true, user: user };
  }
  return { success: false, msg: 'Wrong password' };
}

// ============================================
// MINING
// ============================================
async function performMining() {
  const now = Date.now();
  const lastMine = currentUser.lastMine ? new Date(currentUser.lastMine).getTime() : 0;
  const hoursSince = (now - lastMine) / (1000 * 60 * 60);
  
  if (lastMine > 0 && hoursSince < 24) {
    const left = (24 - hoursSince).toFixed(1);
    return { success: false, msg: `Cooldown: ${left} hours left` };
  }
  
  const reward = 0.5;
  const newBalance = currentUser.balance + reward;
  
  const result = await api('UPDATE_USER_BALANCE', {
    uid: currentUser.uid,
    amount: reward,
    operation: 'add'
  });
  
  if (result.success) {
    await api('SAVE_USER', {
      userData: JSON.stringify({
        email: currentUser.email,
        lastMine: new Date().toISOString()
      })
    });
    
    currentUser.balance = newBalance;
    currentUser.lastMine = new Date().toISOString();
    
    return { success: true, reward: reward, newBalance: newBalance };
  }
  return { success: false, msg: 'Mining failed' };
}

// ============================================
// ADMIN FUNCTIONS
// ============================================
async function getAllUsers() {
  const result = await api('GET_ALL_USERS');
  if (result.success) {
    allUsers = result.users;
    return result.users;
  }
  return [];
}

async function updateUserBalance(uid, amount, operation) {
  return await api('UPDATE_USER_BALANCE', { uid, amount, operation });
}

async function updateUserStatus(uid, status) {
  return await api('UPDATE_USER_STATUS', { uid, status });
}

async function createAnnouncement(title, content) {
  return await api('CREATE_ANNOUNCEMENT', {
    title: title,
    content: content,
    authorUID: currentUser.uid,
    priority: 'high'
  });
}

async function getAnnouncements() {
  const result = await api('GET_ANNOUNCEMENTS');
  if (result.success) {
    return result.announcements;
  }
  return [];
}

// ============================================
// CHAT FUNCTIONS
// ============================================
async function sendMessage(toUID, message) {
  return await api('SEND_MESSAGE', {
    fromUID: currentUser.uid,
    toUID: toUID,
    message: message
  });
}

async function getMessages(withUID) {
  const result = await api('GET_MESSAGES', {
    uid: currentUser.uid,
    withUID: withUID
  });
  return result.messages || [];
}

// ============================================
// UI RENDERING
// ============================================
function showMessage(elementId, msg, isError = true) {
  const el = document.getElementById(elementId);
  if (el) {
    el.innerHTML = `<div class="message-text ${isError ? 'error' : 'success'}">${msg}</div>`;
    setTimeout(() => {
      if (document.getElementById(elementId)) {
        document.getElementById(elementId).innerHTML = '';
      }
    }, 3000);
  }
}

// Render Login/Register Screen
function renderAuth() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div style="max-width: 450px; margin: 80px auto;">
      <div class="card">
        <div style="text-align: center; margin-bottom: 25px;">
          <h1 style="font-size: 36px; background: linear-gradient(135deg, #00ffcc, #0099ff); -webkit-background-clip: text; background-clip: text; color: transparent;">⚡ NexusMine</h1>
          <p style="color: #8aa9d1;">Advanced Crypto Mining Platform</p>
        </div>
        
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
          <button id="loginTab" style="flex:1;" class="active-tab">Login</button>
          <button id="registerTab" style="flex:1;">Register</button>
        </div>
        
        <div id="authForm">
          <input type="email" id="email" placeholder="Email address">
          <input type="password" id="password" placeholder="Password">
          <button id="submitBtn" style="width:100%; margin-top: 10px;">Login</button>
        </div>
        <div id="authMsg"></div>
      </div>
    </div>
  `;
  
  let mode = 'login';
  
  document.getElementById('loginTab').onclick = () => {
    mode = 'login';
    document.getElementById('submitBtn').innerText = 'Login';
    document.getElementById('authMsg').innerHTML = '';
  };
  
  document.getElementById('registerTab').onclick = () => {
    mode = 'register';
    document.getElementById('submitBtn').innerText = 'Register';
    document.getElementById('authMsg').innerHTML = '';
  };
  
  document.getElementById('submitBtn').onclick = async () => {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    
    if (mode === 'login') {
      const result = await login(email, password);
      if (result.success) {
        currentUser = result.user;
        renderDashboard();
      } else {
        showMessage('authMsg', result.msg, true);
      }
    } else {
      const result = await register(email, password);
      if (result.success) {
        showMessage('authMsg', result.msg, false);
        document.getElementById('email').value = '';
        document.getElementById('password').value = '';
      } else {
        showMessage('authMsg', result.msg, true);
      }
    }
  };
}

// Render Main Dashboard
function renderDashboard() {
  const app = document.getElementById('app');
  const isAdmin = currentUser.role === 'admin';
  
  app.innerHTML = `
    <div class="header">
      <div class="logo">
        <h1>⚡ NexusMine Pro</h1>
        <p>Advanced Mining Platform</p>
      </div>
      <div class="user-card">
        <span>${currentUser.email}</span>
        <span class="balance" id="headerBalance">${currentUser.balance.toFixed(4)} NXM</span>
        <span class="role-badge ${isAdmin ? 'role-admin' : 'role-user'}">${isAdmin ? 'ADMIN' : 'MINER'}</span>
        <button id="logoutBtn">Logout</button>
      </div>
    </div>
    
    <div class="dashboard">
      <div class="sidebar">
        <div class="nav-item ${currentPage === 'mining' ? 'active' : ''}" data-page="mining">⛏️ Mining Dashboard</div>
        <div class="nav-item ${currentPage === 'stats' ? 'active' : ''}" data-page="stats">📊 My Statistics</div>
        ${isAdmin ? `
          <div class="nav-item ${currentPage === 'users' ? 'active' : ''}" data-page="users">👥 User Management</div>
          <div class="nav-item ${currentPage === 'announcements' ? 'active' : ''}" data-page="announcements">📢 Announcements</div>
        ` : ''}
        <div class="nav-item ${currentPage === 'chat' ? 'active' : ''}" data-page="chat">💬 Support Chat</div>
      </div>
      <div class="content" id="pageContent"></div>
    </div>
  `;
  
  document.getElementById('logoutBtn').onclick = () => {
    currentUser = null;
    if (messageInterval) clearInterval(messageInterval);
    renderAuth();
  };
  
  document.querySelectorAll('.nav-item').forEach(item => {
    item.onclick = () => {
      currentPage = item.dataset.page;
      renderDashboard();
    };
  });
  
  renderPageContent();
}

// Render Current Page Content
async function renderPageContent() {
  const content = document.getElementById('pageContent');
  
  switch(currentPage) {
    case 'mining':
      await renderMining(content);
      break;
    case 'stats':
      await renderStats(content);
      break;
    case 'users':
      await renderUserManagement(content);
      break;
    case 'announcements':
      await renderAnnouncements(content);
      break;
    case 'chat':
      await renderChat(content);
      break;
  }
}

async function renderMining(container) {
  const lastMine = currentUser.lastMine ? new Date(currentUser.lastMine).getTime() : 0;
  const canMine = !lastMine || (Date.now() - lastMine) >= (24 * 3600000);
  const hoursLeft = !canMine ? ((24 * 3600000 - (Date.now() - lastMine)) / 3600000).toFixed(1) : 0;
  
  container.innerHTML = `
    <div class="mining-area">
      <div class="mining-animation" id="miningAnim">⛏️ 💎 ⛏️</div>
      <h2>Mining Reward: 0.5 NXM per session</h2>
      <p style="color: #8aa9d1; margin: 10px 0;">⏰ Cooldown: 24 hours</p>
      <button class="mine-btn" id="mineBtn" ${!canMine ? 'disabled' : ''}>
        ${canMine ? '⚡ START MINING' : `⏰ COOLDOWN (${hoursLeft}h)`}
      </button>
      <div id="mineMsg" style="margin-top: 20px;"></div>
    </div>
  `;
  
  document.getElementById('mineBtn')?.addEventListener('click', async () => {
    const anim = document.getElementById('miningAnim');
    const btn = document.getElementById('mineBtn');
    const msgDiv = document.getElementById('mineMsg');
    
    anim.innerHTML = '🌀 MINING IN PROGRESS 🌀';
    btn.disabled = true;
    
    const result = await performMining();
    
    if (result.success) {
      anim.innerHTML = '✅ +0.5 NXM MINED! ✅';
      msgDiv.innerHTML = `<div class="success">${result.msg || 'Mining successful!'}</div>`;
      document.getElementById('headerBalance').innerHTML = result.newBalance.toFixed(4) + ' NXM';
      setTimeout(() => renderMining(container), 2000);
    } else {
      anim.innerHTML = '⛏️ 💎 ⛏️';
      msgDiv.innerHTML = `<div class="error">❌ ${result.msg}</div>`;
      btn.disabled = false;
      if (result.msg.includes('Cooldown')) setTimeout(() => renderMining(container), 2000);
    }
  });
}

async function renderStats(container) {
  container.innerHTML = `
    <div class="card">
      <div class="card-title">📊 Your Mining Statistics</div>
      <div style="padding: 15px 0; border-bottom: 1px solid #2a3a5a;">
        <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
          <span>💰 Current Balance</span>
          <span style="color: #00ffcc; font-size: 24px;">${currentUser.balance.toFixed(4)} NXM</span>
        </div>
        <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
          <span>⏰ Last Mining Session</span>
          <span>${currentUser.lastMine ? new Date(currentUser.lastMine).toLocaleString() : 'Never'}</span>
        </div>
        <div style="display: flex; justify-content: space-between;">
          <span>✅ Account Status</span>
          <span class="${currentUser.status === 'verified' ? 'status-verified' : 'status-unverified'}">${currentUser.status || 'unverified'}</span>
        </div>
      </div>
    </div>
  `;
}

async function renderUserManagement(container) {
  const users = await getAllUsers();
  
  container.innerHTML = `
    <div class="card">
      <div class="card-title">👥 User Management</div>
      <div class="table-container">
        <table>
          <thead>
            <tr><th>Email</th><th>Balance</th><th>Role</th><th>Status</th><th>Actions</th><
