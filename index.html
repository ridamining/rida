<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rida Network Dashboard</title>
<style>
  body {margin:0; font-family:'Arial',sans-serif; background:#121212; color:#fff;}
  .container {max-width:450px; margin:50px auto; padding:25px; background:#1e1e1e; border-radius:12px;}
  input, button, textarea {width:100%; padding:12px; margin:8px 0; border-radius:6px; border:none; box-sizing:border-box;}
  button {background:#ff4c4c; color:#fff; font-weight:bold; cursor:pointer;}
  button:hover {background:#ff1a1a;}
  .hide {display:none;}
  .header {text-align:center; margin-bottom:20px;}
  .header h1 {margin:0; color:#ff4c4c;}
  .msg {color:#ff4c4c; text-align:center; margin:10px 0;}
  .dashboard p {margin:6px 0; font-weight:bold;}
  textarea {resize:none; height:60px;}
</style>
</head>
<body>

<!-- AUTH BOX -->
<div class="container" id="authBox">
  <div class="header"><h1>Rida Network</h1></div>
  <div id="msg" class="msg"></div>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button id="loginBtn">Login</button>
  <button id="registerBtn">Register</button>
</div>

<!-- DASHBOARD BOX -->
<div class="container hide" id="dashboardBox">
  <div class="header"><h1>Dashboard</h1></div>
  <p id="welcomeText"></p>
  <p>Balance: <span id="balance">0</span> Rida</p>
  <button id="mineBtn">Start Mining</button>
  <div id="adminBox" class="hide">
    <textarea id="broadcastMsg" placeholder="Broadcast message"></textarea>
    <button id="broadcastBtn">Send Broadcast</button>
  </div>
  <button id="logoutBtn">Logout</button>
  <div id="dashMsg" class="msg"></div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwfjeDF7ZZDvb3BRKSYuTYj5KZgwTW0f0gRETlE1ST6ej3E5uOinhf93Cn1g6u9DXjk/exec"; // your backend
let currentUser = null;

function showMsg(msg,id="msg"){document.getElementById(id).innerText=msg;}

// ---------- AUTH ----------
async function sendRequest(params){
  try{
    const url = API_URL + "?" + new URLSearchParams(params).toString();
    const resp = await fetch(url, {method:"GET"});
    const data = await resp.json();
    return data;
  }catch(e){
    return {success:false,msg:"Cannot connect to server"};
  }
}

document.getElementById("loginBtn").onclick = async () => {
  const email=document.getElementById("email").value.trim();
  const password=document.getElementById("password").value.trim();
  if(!email||!password) return showMsg("Email & Password required");

  const res = await sendRequest({action:"LOGIN", email, password});
  if(res.success){currentUser=res; showDashboard();}
  else showMsg(res.msg);
};

document.getElementById("registerBtn").onclick = async () => {
  const email=document.getElementById("email").value.trim();
  const password=document.getElementById("password").value.trim();
  if(!email||!password) return showMsg("Email & Password required");

  const res = await sendRequest({action:"REGISTER", email, password});
  showMsg(res.msg);
};

// ---------- DASHBOARD ----------
function showDashboard(){
  document.getElementById("authBox").classList.add("hide");
  document.getElementById("dashboardBox").classList.remove("hide");
  document.getElementById("welcomeText").innerText=`Welcome, ${currentUser.uid || currentUser.email}`;
  document.getElementById("balance").innerText=currentUser.balance || 0;
  if(currentUser.role==="admin") document.getElementById("adminBox").classList.remove("hide");
}

// Logout
document.getElementById("logoutBtn").onclick = () => {
  currentUser=null;
  document.getElementById("dashboardBox").classList.add("hide");
  document.getElementById("authBox").classList.remove("hide");
  showMsg("");
  document.getElementById("dashMsg").innerText="";
};

// ---------- MINING ----------
document.getElementById("mineBtn").onclick = async () => {
  if(!currentUser) return;
  const res = await sendRequest({action:"MINE", uid:currentUser.uid});
  document.getElementById("dashMsg").innerText=res.msg;
  if(res.success){currentUser.balance=res.balance; document.getElementById("balance").innerText=res.balance;}
};

// ---------- ADMIN BROADCAST ----------
document.getElementById("broadcastBtn").onclick = async () => {
  const msg=document.getElementById("broadcastMsg").value.trim();
  if(!msg) return;
  const res = await sendRequest({action:"BROADCAST", uid:currentUser.uid, message:msg});
  document.getElementById("dashMsg").innerText=res.msg;
};
</script>
</body>
</html>
