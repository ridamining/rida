<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIDA Explorer & Support</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: transparent; color: #fff; font-family: 'Outfit', sans-serif; padding: 15px; }
        .stat-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 1rem; padding: 15px; }
        .tab-btn { padding: 10px 20px; font-size: 11px; font-weight: 900; letter-spacing: 1px; color: #475569; }
        .tab-active { color: #38bdf8; border-bottom: 2px solid #38bdf8; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="flex justify-around border-b border-white/10 mb-6">
        <button onclick="tab('stats')" id="t-stats" class="tab-btn tab-active">STATS</button>
        <button onclick="tab('leader')" id="t-leader" class="tab-btn">TOP NODES</button>
        <button onclick="tab('support')" id="t-support" class="tab-btn">SUPPORT</button>
    </div>

    <div id="v-stats" class="space-y-4">
        <div class="grid grid-cols-2 gap-3">
            <div class="stat-card">
                <p class="text-[8px] text-slate-500 font-bold uppercase">Total Rida Mined</p>
                <h3 id="n-total" class="text-lg font-black text-sky-400 tracking-tighter">0.00</h3>
            </div>
            <div class="stat-card">
                <p class="text-[8px] text-slate-500 font-bold uppercase">Active Nodes</p>
                <h3 id="n-users" class="text-lg font-black text-white tracking-tighter">0</h3>
            </div>
        </div>
        <div class="stat-card border-dashed">
            <p class="text-[8px] text-sky-500 font-bold uppercase">Recent Network Activity</p>
            <div id="live-ledger" class="mt-2 text-[9px] font-mono text-slate-500 space-y-1">
                </div>
        </div>
    </div>

    <div id="v-leader" class="hidden space-y-3">
        <h4 class="text-[10px] font-black text-slate-500 uppercase">Top Verified Nodes</h4>
        <div id="leader-list" class="space-y-2">
            </div>
    </div>

    <div id="v-support" class="hidden space-y-4">
        <div class="stat-card bg-sky-500/5 border-sky-500/20">
            <p class="text-xs font-bold mb-2">Open Support Ticket</p>
            <textarea id="sup-msg" placeholder="Describe your issue..." class="w-full bg-black/40 border border-white/10 p-3 rounded-xl text-xs h-24 outline-none"></textarea>
            <button onclick="sendTicket()" class="w-full mt-2 bg-sky-500 py-3 rounded-xl text-[10px] font-black uppercase">Submit Request</button>
        </div>
        <div id="ticket-history" class="space-y-2">
            <p class="text-[8px] text-slate-500 font-bold uppercase">Your Ticket Status</p>
            </div>
    </div>

    <script>
        const API = 'https://script.google.com/macros/s/AKfycbycO3WbrAycpHFSCPWP2jTfZ_2_c8p47ugbgN1mg3JhcqHIsZaFd6jf9zBsTRP7eeuU/exec';
        const urlParams = new URLSearchParams(window.location.search);
        const userUid = urlParams.get('uid');

        async function loadExplorer() {
            try {
                const res = await (await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'getExplorerStats' }) })).json();
                document.getElementById('n-total').innerText = res.totalMined.toFixed(2);
                document.getElementById('n-users').innerText = res.activeUsers;
                
                // Leaderboard
                document.getElementById('leader-list').innerHTML = res.topUsers.map((u, i) => `
                    <div class="flex justify-between items-center p-3 bg-white/5 rounded-xl border border-white/5">
                        <span class="text-xs font-bold text-slate-400">#${i+1} ${u.uid}</span>
                        <span class="text-xs font-black text-sky-400">${u.balance.toFixed(2)} RIDA</span>
                    </div>
                `).join('');

                // Live Activity
                document.getElementById('live-ledger').innerHTML = res.recentLogs.map(l => `
                    <div class="flex justify-between"><span>${l.type}</span> <span class="text-sky-500/50">${l.time}</span></div>
                `).join('');
            } catch(e) {}
        }

        async function sendTicket() {
            const msg = document.getElementById('sup-msg').value;
            if(!msg) return;
            await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'submitTicket', uid: userUid, message: msg }) });
            document.getElementById('sup-msg').value = '';
            alert("Ticket Submitted. Check history for updates.");
            loadTickets();
        }

        async function loadTickets() {
            const res = await (await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'getTickets', uid: userUid }) })).json();
            document.getElementById('ticket-history').innerHTML = res.data.map(t => `
                <div class="stat-card">
                    <div class="flex justify-between text-[8px] mb-1">
                        <span class="text-sky-500 uppercase">${t.status}</span>
                        <span>${t.date}</span>
                    </div>
                    <p class="text-[10px] text-slate-300">${t.msg}</p>
                    ${t.reply ? `<div class="mt-2 pt-2 border-t border-white/5 text-[10px] text-sky-400">Admin: ${t.reply}</div>` : ''}
                </div>
            `).join('');
        }

        function tab(t) {
            ['stats','leader','support'].forEach(v => {
                document.getElementById('v-'+v).classList.add('hidden');
                document.getElementById('t-'+v).classList.remove('tab-active');
            });
            document.getElementById('v-'+t).classList.remove('hidden');
            document.getElementById('t-'+t).classList.add('tab-active');
            if(t === 'support') loadTickets();
        }

        loadExplorer();
    </script>
</body>
</html>
