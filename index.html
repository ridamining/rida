<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>NexusMine Pro | Advanced Crypto Mining Platform</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    :root {
      --bg-primary: #0a0f1e;
      --bg-secondary: #0d1425;
      --bg-card: rgba(15, 25, 45, 0.95);
      --border-color: rgba(0, 255, 255, 0.2);
      --cyan: #00ffcc;
      --cyan-glow: rgba(0, 255, 204, 0.3);
      --purple: #b76eff;
      --orange: #ff9f4a;
      --red: #ff5e7e;
      --green: #4effb5;
      --text-primary: #eef5ff;
      --text-secondary: #8aa9d1;
    }

    body {
      background: radial-gradient(circle at 10% 20%, var(--bg-primary), #03050b);
      min-height: 100vh;
      padding: 16px;
    }

    .app-container {
      max-width: 1400px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 16px 24px;
      margin-bottom: 24px;
      border: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }

    .logo h1 {
      font-size: 1.8rem;
      background: linear-gradient(135deg, var(--cyan), #2ad4ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .logo p {
      font-size: 0.7rem;
      color: var(--text-secondary);
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 20px;
      background: rgba(0, 0, 0, 0.4);
      padding: 8px 20px;
      border-radius: 50px;
    }

    .balance-display {
      font-size: 1.3rem;
      font-weight: bold;
      color: var(--cyan);
    }

    .role-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: bold;
    }

    .role-admin {
      background: rgba(183, 110, 255, 0.2);
      color: var(--purple);
      border: 1px solid var(--purple);
    }

    .role-user {
      background: rgba(0, 255, 204, 0.15);
      color: var(--cyan);
      border: 1px solid var(--cyan);
    }

    /* Dashboard Layout */
    .dashboard-layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 24px;
    }

    @media (max-width: 768px) {
      .dashboard-layout {
        grid-template-columns: 1fr;
      }
    }

    /* Sidebar */
    .sidebar {
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      border: 1px solid var(--border-color);
      padding: 20px;
      height: fit-content;
    }

    .nav-item {
      padding: 12px 16px;
      margin: 8px 0;
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text-secondary);
    }

    .nav-item:hover {
      background: rgba(0, 255, 204, 0.1);
      color: var(--cyan);
    }

    .nav-item.active {
      background: rgba(0, 255, 204, 0.15);
      color: var(--cyan);
      border-left: 3px solid var(--cyan);
    }

    /* Main Content */
    .main-content {
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      border: 1px solid var(--border-color);
      padding: 24px;
      min-height: 500px;
    }

    /* Cards */
    .card {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid var(--border-color);
    }

    .card-title {
      font-size: 1.2rem;
      font-weight: bold;
      margin-bottom: 16px;
      color: var(--cyan);
    }

    /* Mining Area */
    .mining-area {
      text-align: center;
      padding: 30px;
    }

    .mining-animation {
      font-size: 4rem;
      margin: 20px 0;
    }

    .mine-button {
      background: radial-gradient(circle at 30% 10%, #ffb347, #ff7e05);
      border: none;
      padding: 18px 40px;
      font-size: 1.3rem;
      font-weight: bold;
      border-radius: 60px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 0 20px rgba(255, 125, 5, 0.5);
    }

    .mine-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Tables */
    .user-table {
      width: 100%;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid var(--border-color);
    }

    th {
      color: var(--cyan);
      font-weight: 600;
    }

    /* Chat */
    .chat-container {
      display: flex;
      flex-direction: column;
      height: 500px;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 16px;
      margin-bottom: 16px;
    }

    .message-bubble {
      margin-bottom: 12px;
      padding: 10px 14px;
      border-radius: 18px;
      max-width: 70%;
    }

    .message-out {
      background: rgba(0, 255, 204, 0.15);
      margin-left: auto;
      color: var(--cyan);
    }

    .message-in {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-primary);
    }

    .chat-input-area {
      display: flex;
      gap: 12px;
    }

    .chat-input-area input {
      flex: 1;
      padding: 12px;
      border-radius: 30px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid var(--border-color);
      color: white;
    }

    /* Buttons */
    .btn-primary {
      background: linear-gradient(95deg, #0e2a3b, #0a1a2f);
      border: 1px solid var(--cyan);
      padding: 10px 20px;
      border-radius: 30px;
      color: var(--cyan);
      cursor: pointer;
    }

    .btn-success {
      background: rgba(78, 255, 181, 0.2);
      border: 1px solid var(--green);
      color: var(--green);
    }

    .btn-danger {
      background: rgba(255, 94, 126, 0.2);
      border: 1px solid var(--red);
      color: var(--red);
    }

    /* Forms */
    input, select, textarea {
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid var(--border-color);
      padding: 10px 14px;
      border-radius: 12px;
      color: white;
      width: 100%;
    }

    /* Status Badges */
    .status-badge {
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 0.7rem;
    }

    .status-verified {
      background: rgba(78, 255, 181, 0.2);
      color: var(--green);
    }

    .status-unverified {
      background: rgba(255, 94, 126, 0.2);
      color: var(--red);
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: var(--bg-card);
      border-radius: 24px;
      padding: 24px;
      max-width: 500px;
      width: 90%;
      border: 1px solid var(--cyan);
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-secondary);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.9);
      padding: 12px 24px;
      border-radius: 50px;
      border-left: 4px solid var(--cyan);
      z-index: 1100;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }
  </style>
</head>
<body>
<div class="app-container" id="app">
  <!-- Header will be injected -->
  <div id="header"></div>
  <div id="dashboard"></div>
</div>

<script>
// ============================================
// CONFIGURATION
// ============================================
const API_URL = 'https://script.google.com/macros/s/AKfycbzaJ3N8ZQ8f9zwLXlbBL0P-ZurhvLr5za8kIIRRwBR3R8_WKR_3EU1I4Hv16IXpEmOz/exec';

// ============================================
// GLOBAL STATE
// ============================================
let currentUser = null;
let currentPage = 'mining';
let selectedChatUser = null;
let allUsers = [];
let announcements = [];
let messageInterval = null;

// ============================================
// API HELPER
// ============================================
async function api(action, data = {}) {
  const params = new URLSearchParams({ action, ...data });
  const url = API_URL + '?' + params.toString();
  
  try {
    const response = await fetch(url);
    return await response.json();
  } catch (error) {
    console.error('API Error:', error);
    return { success: false, msg: error.message };
  }
}

// ============================================
// PASSWORD HASH
// ============================================
function hashPassword(pwd) {
  let hash = 0;
  for (let i = 0; i < pwd.length; i++) {
    hash = ((hash << 5) - hash) + pwd.charCodeAt(i);
    hash = hash & hash;
  }
  return btoa(pwd + '_nexus_' + Math.abs(hash));
}

// ============================================
// USER MANAGEMENT
// ============================================
async function register(email, password) {
  email = email.trim().toLowerCase();
  password = password.trim();
  
  if (!email || !password) return { success: false, msg: 'All fields required' };
  if (password.length < 4) return { success: false, msg: 'Password too short' };
  
  const existing = await api('GET_USER', { email });
  if (existing.success) return { success: false, msg: 'Email already exists' };
  
  const result = await api('SAVE_USER', {
    userData: JSON.stringify({
      email: email,
      password: hashPassword(password),
      balance: 100,
      role: email === 'admin@nexus.com' ? 'admin' : 'user',
      status: 'unverified',
      lastMine: '',
      createdAt: new Date().toISOString()
    })
  });
  
  if (result.success) {
    showToast('Registration successful! Please login.', 'success');
    return { success: true };
  }
  return { success: false, msg: 'Registration failed' };
}

async function login(email, password) {
  email = email.trim().toLowerCase();
  const user = await api('GET_USER', { email });
  
  if (!user.success) return { success: false, msg: 'User not found' };
  if (user.password === hashPassword(password.trim())) {
    await api('SAVE_USER', {
      userData: JSON.stringify({
        email: user.email,
        lastActive: new Date().toISOString()
      })
    });
    return { success: true, user: user };
  }
  return { success: false, msg: 'Wrong password' };
}

// ============================================
// MINING LOGIC
// ============================================
async function performMining() {
  const now = Date.now();
  const lastMine = currentUser.lastMine ? new Date(currentUser.lastMine).getTime() : 0;
  const hoursSince = (now - lastMine) / (1000 * 60 * 60);
  
  if (lastMine > 0 && hoursSince < 24) {
    const left = (24 - hoursSince).toFixed(1);
    return { success: false, msg: `Cooldown: ${left} hours left` };
  }
  
  const reward = 0.5;
  const newBalance = currentUser.balance + reward;
  
  const result = await api('UPDATE_USER_BALANCE', {
    uid: currentUser.uid,
    amount: reward,
    operation: 'add'
  });
  
  if (result.success) {
    await api('ADD_MINING_LOG', {
      uid: currentUser.uid,
      amount: reward,
      status: 'success'
    });
    
    await api('SAVE_USER', {
      userData: JSON.stringify({
        email: currentUser.email,
        lastMine: new Date().toISOString()
      })
    });
    
    currentUser.balance = newBalance;
    currentUser.lastMine = new Date().toISOString();
    
    return { success: true, reward: reward, newBalance: newBalance };
  }
  return { success: false, msg: 'Mining failed' };
}

// ============================================
// ADMIN FUNCTIONS
// ============================================
async function getAllUsers() {
  const result = await api('GET_ALL_USERS');
  if (result.success) {
    allUsers = result.users;
    return result.users;
  }
  return [];
}

async function updateUserBalance(uid, amount, operation) {
  return await api('UPDATE_USER_BALANCE', { uid, amount, operation });
}

async function updateUserStatus(uid, status) {
  return await api('UPDATE_USER_STATUS', { uid, status });
}

async function createAnnouncement(title, content) {
  return await api('CREATE_ANNOUNCEMENT', {
    title: title,
    content: content,
    authorUID: currentUser.uid,
    priority: 'high'
  });
}

async function getAnnouncements() {
  const result = await api('GET_ANNOUNCEMENTS');
  if (result.success) {
    announcements = result.announcements;
    return announcements;
  }
  return [];
}

// ============================================
// CHAT FUNCTIONS
// ============================================
async function sendMessage(toUID, message) {
  return await api('SEND_MESSAGE', {
    fromUID: currentUser.uid,
    toUID: toUID,
    message: message
  });
}

async function getMessages(withUID) {
  const result = await api('GET_MESSAGES', {
    uid: currentUser.uid,
    withUID: withUID
  });
  return result.messages || [];
}

// ============================================
// UI RENDERING
// ============================================
function showToast(msg, type = 'info') {
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerHTML = msg;
  toast.style.borderLeftColor = type === 'success' ? '#4effb5' : type === 'error' ? '#ff5e7e' : '#00ffcc';
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

function renderAuth() {
  const container = document.getElementById('dashboard');
  container.innerHTML = `
    <div style="max-width: 450px; margin: 50px auto;">
      <div class="card">
        <div style="text-align: center; margin-bottom: 24px;">
          <h2 style="color: var(--cyan);">⚡ Welcome to NexusMine</h2>
          <p style="color: var(--text-secondary);">Advanced Crypto Mining Platform</p>
        </div>
        <div class="toggle-group" style="display: flex; gap: 12px; margin-bottom: 24px;">
          <button class="btn-primary" id="loginTab" style="flex:1;">Login</button>
          <button class="btn-primary" id="registerTab" style="flex:1;">Register</button>
        </div>
        <div id="authForm">
          <input type="email" id="email" placeholder="Email" style="margin-bottom: 12px;">
          <input type="password" id="password" placeholder="Password" style="margin-bottom: 12px;">
          <button class="btn-primary" id="submitBtn" style="width:100%;">Login</button>
        </div>
        <div id="authMsg" class="message" style="margin-top: 16px; text-align: center;"></div>
      </div>
    </div>
  `;
  
  let mode = 'login';
  
  document.getElementById('loginTab').onclick = () => {
    mode = 'login';
    document.getElementById('submitBtn').textContent = 'Login';
    document.getElementById('authMsg').innerHTML = '';
  };
  
  document.getElementById('registerTab').onclick = () => {
    mode = 'register';
    document.getElementById('submitBtn').textContent = 'Register';
    document.getElementById('authMsg').innerHTML = '';
  };
  
  document.getElementById('submitBtn').onclick = async () => {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const msgDiv = document.getElementById('authMsg');
    
    if (mode === 'login') {
      const result = await login(email, password);
      if (result.success) {
        currentUser = result.user;
        await initApp();
      } else {
        msgDiv.innerHTML = `<span style="color: var(--red);">❌ ${result.msg}</span>`;
      }
    } else {
      const result = await register(email, password);
      if (result.success) {
        msgDiv.innerHTML = `<span style="color: var(--green);">✅ ${result.msg}</span>`;
        document.getElementById('email').value = '';
        document.getElementById('password').value = '';
      } else {
        msgDiv.innerHTML = `<span style="color: var(--red);">❌ ${result.msg}</span>`;
      }
    }
  };
}

function renderHeader() {
  const header = document.getElementById('header');
  if (!currentUser) return;
  
  header.innerHTML = `
    <div class="header">
      <div class="logo">
        <h1>⚡ NexusMine Pro</h1>
        <p>Advanced Mining Platform v2.0</p>
      </div>
      <div class="user-info">
        <span>${currentUser.email}</span>
        <span class="balance-display" id="headerBalance">${currentUser.balance.toFixed(4)} NXM</span>
        <span class="role-badge ${currentUser.role === 'admin' ? 'role-admin' : 'role-user'}">${currentUser.role === 'admin' ? '👑 ADMIN' : '⛏️ MINER'}</span>
        <button class="btn-primary" id="logoutBtn" style="margin:0; padding:6px 16px;">Logout</button>
      </div>
    </div>
  `;
  
  document.getElementById('logoutBtn').onclick = () => {
    currentUser = null;
    if (messageInterval) clearInterval(messageInterval);
    initApp();
  };
}

function renderDashboard() {
  const container = document.getElementById('dashboard');
  const isAdmin = currentUser.role === 'admin';
  
  container.innerHTML = `
    <div class="dashboard-layout">
      <div class="sidebar">
        <div class="nav-item ${currentPage === 'mining' ? 'active' : ''}" data-page="mining">
          ⛏️ Mining Dashboard
        </div>
        <div class="nav-item ${currentPage === 'stats' ? 'active' : ''}" data-page="stats">
          📊 Mining Stats
        </div>
        ${isAdmin ? `
          <div class="nav-item ${currentPage === 'users' ? 'active' : ''}" data-page="users">
            👥 User Management
          </div>
          <div class="nav-item ${currentPage === 'announcements' ? 'active' : ''}" data-page="announcements">
            📢 Announcements
          </div>
        ` : ''}
        <div class="nav-item ${currentPage === 'chat' ? 'active' : ''}" data-page="chat">
          💬 Support Chat
        </div>
      </div>
      <div class="main-content" id="pageContent"></div>
    </div>
  `;
  
  document.querySelectorAll('.nav-item').forEach(item => {
    item.onclick = () => {
      currentPage = item.dataset.page;
      renderDashboard();
    };
  });
  
  renderPageContent();
}

async function renderPageContent() {
  const content = document.getElementById('pageContent');
  
  switch(currentPage) {
    case 'mining':
      await renderMining(content);
      break;
    case 'stats':
      await renderStats(content);
      break;
    case 'users':
      await renderUserManagement(content);
      break;
    case 'announcements':
      await renderAnnouncements(content);
      break;
    case 'chat':
      await renderChat(content);
      break;
  }
}

async function renderMining(container) {
  const lastMine = currentUser.lastMine ? new Date(currentUser.lastMine).getTime() : 0;
  const canMine = !lastMine || (Date.now() - lastMine) >= (24 * 3600000);
  const hoursLeft = !canMine ? ((24 * 3600000 - (Date.now() - lastMine)) / 3600000).toFixed(1) : 0;
  
  container.innerHTML = `
    <div class="mining-area">
      <div class="mining-animation" id="miningAnim">⛏️ 💎 ⛏️</div>
      <h2>Mining Reward: 0.5 NXM per session</h2>
      <p style="color: var(--text-secondary); margin: 10px 0;">Cooldown: 24 hours</p>
      <button class="mine-button" id="mineBtn" ${!canMine ? 'disabled' : ''}>
        ${canMine ? '⚡ START MINING' : `⏰ COOLDOWN (${hoursLeft}h)`}
      </button>
      <div id="mineMsg" style="margin-top: 20px;"></div>
    </div>
  `;
  
  document.getElementById('mineBtn')?.addEventListener('click', async () => {
    const anim = document.getElementById('miningAn
