<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rida Network Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  body { background:#0d1117; color:#c9d1d9; }
  .card { background:#161b22; border:none; }
  .btn-primary { background:#238636; border:none; }
  .navbar { background:#161b22; }
  .form-control, .form-control:focus { background:#0d1117; color:#c9d1d9; border:1px solid #30363d; }
</style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
  <a class="navbar-brand" href="#">Rida Network</a>
</nav>

<div class="container mt-5" id="auth-container">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card p-4">
        <h4 class="mb-3 text-center" id="form-title">Login</h4>
        <div id="alert-msg" class="alert alert-danger d-none"></div>
        <input type="email" id="email" class="form-control mb-2" placeholder="Email">
        <input type="password" id="password" class="form-control mb-2" placeholder="Password">
        <button id="submit-btn" class="btn btn-primary w-100">Login</button>
        <p class="mt-3 text-center">
          <span id="toggle-auth" style="cursor:pointer; text-decoration:underline;">Register new account</span>
        </p>
      </div>
    </div>
  </div>
</div>

<div class="container mt-5 d-none" id="dashboard-container">
  <div class="row">
    <div class="col-md-12">
      <div class="card p-4">
        <h4>Welcome, <span id="user-email"></span></h4>
        <p>Balance: <span id="user-balance">0</span> Rida</p>
        <button id="mine-btn" class="btn btn-primary mb-3">Start Mining</button>
        <button id="logout-btn" class="btn btn-secondary">Logout</button>
        <div id="dashboard-msg" class="mt-2"></div>
      </div>
    </div>
  </div>
</div>

<script>
const BACKEND_URL = "https://script.google.com/macros/s/AKfycbxGAGrIdJtGd_hglTSMsD-SjnY_0bM8sVL4B3Ovz9MdMKw5kv9woKVJ_eYyB0TU0DTg/exec";

let isLogin = true;
let currentUser = null;

const authContainer = document.getElementById("auth-container");
const dashboardContainer = document.getElementById("dashboard-container");
const formTitle = document.getElementById("form-title");
const submitBtn = document.getElementById("submit-btn");
const toggleAuth = document.getElementById("toggle-auth");
const alertMsg = document.getElementById("alert-msg");

toggleAuth.addEventListener("click", () => {
  isLogin = !isLogin;
  formTitle.textContent = isLogin ? "Login" : "Register";
  submitBtn.textContent = isLogin ? "Login" : "Register";
  toggleAuth.textContent = isLogin ? "Register new account" : "Already have account? Login";
  alertMsg.classList.add("d-none");
});

submitBtn.addEventListener("click", async () => {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  if(!email || !password){ showAlert("Email & Password required"); return; }

  const action = isLogin ? "LOGIN" : "REGISTER";
  const res = await fetch(`${BACKEND_URL}?action=${action}&email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`);
  const data = await res.json();
  
  if(data.success){
    if(isLogin){
      currentUser = data;
      showDashboard();
    } else {
      showAlert("Registered successfully! You can now login.", "success");
      isLogin = true;
      formTitle.textContent = "Login";
      submitBtn.textContent = "Login";
      toggleAuth.textContent = "Register new account";
    }
  } else showAlert(data.msg);
});

function showAlert(msg, type="danger"){
  alertMsg.textContent = msg;
  alertMsg.className = `alert alert-${type}`;
  alertMsg.classList.remove("d-none");
}

function showDashboard(){
  authContainer.classList.add("d-none");
  dashboardContainer.classList.remove("d-none");
  document.getElementById("user-email").textContent = currentUser.email;
  document.getElementById("user-balance").textContent = currentUser.balance;
  document.getElementById("dashboard-msg").textContent = "";
}

document.getElementById("logout-btn").addEventListener("click", () => {
  currentUser = null;
  authContainer.classList.remove("d-none");
  dashboardContainer.classList.add("d-none");
  document.getElementById("email").value = "";
  document.getElementById("password").value = "";
});

document.getElementById("mine-btn").addEventListener("click", async () => {
  if(!currentUser){ showAlert("User not found"); return; }
  const res = await fetch(`${BACKEND_URL}?action=MINE&uid=${currentUser.uid}`);
  const data = await res.json();
  if(data.success){
    currentUser.balance = data.balance;
    document.getElementById("user-balance").textContent = currentUser.balance;
    document.getElementById("dashboard-msg").textContent = data.msg;
  } else {
    document.getElementById("dashboard-msg").textContent = data.msg;
  }
});
</script>

</body>
</html>
