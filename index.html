<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rida Network</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{background:#0b0f19;color:white;font-family:sans-serif;}
.card{
  background:#121826;
  border-radius:16px;
  padding:16px;
  box-shadow:0 0 20px rgba(0,0,0,0.6);
}
.glow{
  animation: glow 2s infinite alternate;
}
@keyframes glow{
  from{box-shadow:0 0 5px #3b82f6;}
  to{box-shadow:0 0 20px #3b82f6;}
}
</style>
</head>

<body class="p-3">

<!-- LOGIN -->
<div id="auth" class="max-w-md mx-auto card">
  <h2 class="text-xl text-center mb-4">🚀 Rida Network</h2>

  <input id="email" placeholder="Email" class="w-full p-2 mb-2 text-black rounded">
  <input id="password" type="password" placeholder="Password" class="w-full p-2 mb-2 text-black rounded">

  <div class="flex gap-2">
    <button onclick="register()" class="bg-green-500 w-1/2 p-2 rounded">Register</button>
    <button onclick="login()" class="bg-blue-500 w-1/2 p-2 rounded">Login</button>
  </div>

  <p id="msg" class="text-sm mt-2"></p>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <!-- HEADER -->
  <div class="flex justify-between items-center mb-4">
    <h2 class="text-lg font-bold">Rida Dashboard</h2>
    <button onclick="logout()" class="text-red-400">Logout</button>
  </div>

  <!-- STATS -->
  <div class="grid grid-cols-2 gap-3 mb-4">
    <div class="card text-center">
      <p>Balance</p>
      <h2 id="balance" class="text-xl">0</h2>
    </div>

    <div class="card text-center">
      <p>Mining Speed</p>
      <h2 id="speed">0.000001/sec</h2>
    </div>

    <div class="card text-center">
      <p>Status</p>
      <h2 id="status">Inactive</h2>
    </div>

    <div class="card text-center">
      <p>UID</p>
      <h2 id="uid">---</h2>
    </div>
  </div>

  <!-- MINING -->
  <div class="card text-center mb-4">
    <button id="mineBtn" onclick="startMining()" class="bg-blue-600 w-full p-3 rounded glow">
      ⛏️ Start Mining
    </button>
    <p id="mineMsg" class="text-sm mt-2"></p>
  </div>

  <!-- REFERRAL -->
  <div class="card mb-4">
    <p>Your Referral Link:</p>
    <input id="refLink" class="w-full text-black p-2 rounded mt-2">
  </div>

  <!-- BROADCAST -->
  <div class="card">
    <textarea id="broadcastText" class="w-full text-black p-2 rounded"></textarea>
    <button onclick="broadcast()" class="bg-green-600 w-full p-2 mt-2 rounded">Send</button>
  </div>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbzBd1aQMLrn7hjdLgdBkg3lioyawl_GaG3BX-kLUyUZ0KA16DRa7SdsQuvccNnweBXC/exec";

let user=null;
let mining=false;
let interval=null;

// API
async function api(p){
  const res=await fetch(API+"?"+new URLSearchParams(p));
  const t=await res.text();
  try{return JSON.parse(t);}catch{return {success:false,msg:"Server error"};}
}

// AUTH
async function register(){
  let r=await api({action:"register",email:email.value,password:password.value});
  msg.innerText=r.msg;
}

async function login(){
  let r=await api({action:"login",email:email.value,password:password.value});
  if(r.success){
    user=r.data||r;
    localStorage.setItem("user",JSON.stringify(user));
    loadApp();
  }else msg.innerText=r.msg;
}

function logout(){
  localStorage.clear();location.reload();
}

// LOAD
function loadApp(){
  auth.classList.add("hidden");
  app.classList.remove("hidden");

  balance.innerText=user.balance||0;
  uid.innerText=user.uid||"N/A";
  refLink.value=location.href+"?ref="+user.uid;
}

// MINING SYSTEM
function startMining(){
  if(mining) return;

  mining=true;
  status.innerText="Mining...";
  mineBtn.innerText="Mining Active";

  let rate=0.1/86400; // per second

  interval=setInterval(()=>{
    user.balance=parseFloat(user.balance)+rate;
    balance.innerText=user.balance.toFixed(6);
  },1000);

  // save once per day
  api({action:"start_mining",uid:user.uid});
}

// BROADCAST
async function broadcast(){
  let r=await api({action:"broadcast",message:broadcastText.value});
  alert(r.msg);
}

// INIT
window.onload=()=>{
  let s=localStorage.getItem("user");
  if(s){user=JSON.parse(s);loadApp();}
};
</script>

</body>
</html>
