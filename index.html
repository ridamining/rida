<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rida Network Dashboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    body { background-color: #0d1117; color: #c9d1d9; }
    .card { background-color: #161b22; border: none; border-radius: 12px; }
    .btn-primary { background-color: #238636; border: none; }
    .btn-primary:hover { background-color: #2ea043; }
    .sidebar { height: 100vh; width: 220px; background-color: #161b22; position: fixed; top:0; left:0; padding-top:20px; }
    .sidebar a { color:#c9d1d9; display:block; padding:12px; text-decoration:none; border-radius:8px; margin:4px 8px; }
    .sidebar a.active, .sidebar a:hover { background-color:#238636; }
    .main { margin-left: 240px; padding: 20px; }
</style>
</head>
<body>

<div class="sidebar">
    <h4 class="text-center mb-4">Rida Network</h4>
    <a href="#" id="nav-dashboard" class="active"><i class="fa fa-tachometer-alt"></i> Dashboard</a>
    <a href="#" id="nav-mining"><i class="fa fa-cogs"></i> Mining</a>
    <a href="#" id="nav-broadcast"><i class="fa fa-bullhorn"></i> Broadcast</a>
    <a href="#" id="nav-logout"><i class="fa fa-sign-out-alt"></i> Logout</a>
</div>

<div class="main">
    <div id="auth-section">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card p-4">
                    <h4 class="text-center mb-3">Login / Register</h4>
                    <input type="email" id="email" class="form-control mb-2" placeholder="Email">
                    <input type="password" id="password" class="form-control mb-2" placeholder="Password">
                    <div class="d-grid gap-2">
                        <button id="login-btn" class="btn btn-primary">Login</button>
                        <button id="register-btn" class="btn btn-secondary">Register</button>
                    </div>
                    <p id="auth-msg" class="text-center mt-2 text-warning"></p>
                </div>
            </div>
        </div>
    </div>

    <div id="dashboard-section" style="display:none;">
        <h3>Welcome, <span id="user-email"></span></h3>
        <div class="row mt-4">
            <div class="col-md-4">
                <div class="card p-3 text-center">
                    <h5>Balance</h5>
                    <p id="user-balance">0</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-3 text-center">
                    <h5>Last Mining</h5>
                    <p id="last-mining">-</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-3 text-center">
                    <h5>Role</h5>
                    <p id="user-role">user</p>
                </div>
            </div>
        </div>

        <div class="mt-4">
            <button id="start-mining-btn" class="btn btn-primary"><i class="fa fa-play"></i> Start Mining</button>
            <p id="mining-msg" class="mt-2 text-success"></p>
        </div>

        <div id="broadcast-section" style="display:none;" class="mt-4">
            <h5>Admin Broadcast</h5>
            <textarea id="broadcast-msg" class="form-control mb-2" placeholder="Type your message"></textarea>
            <button id="broadcast-btn" class="btn btn-primary mb-2">Send Broadcast</button>
            <div id="broadcast-status" class="text-success"></div>
        </div>
    </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwfjeDF7ZZDvb3BRKSYuTYj5KZgwTW0f0gRETlE1ST6ej3E5uOinhf93Cn1g6u9DXjk/exec";
let currentUser = null;

// Login
document.getElementById('login-btn').onclick = async () => {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const res = await fetch(`${API_URL}?action=LOGIN&email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`);
    const data = await res.json();
    if(data.success){
        currentUser = data.data;
        showDashboard();
    } else {
        document.getElementById('auth-msg').innerText = data.msg;
    }
}

// Register
document.getElementById('register-btn').onclick = async () => {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const res = await fetch(`${API_URL}?action=REGISTER&email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`);
    const data = await res.json();
    if(data.success){
        document.getElementById('auth-msg').innerText = "Registration successful! You can login now.";
    } else {
        document.getElementById('auth-msg').innerText = data.msg;
    }
}

// Dashboard
function showDashboard(){
    document.getElementById('auth-section').style.display = 'none';
    document.getElementById('dashboard-section').style.display = 'block';
    document.getElementById('user-email').innerText = currentUser.email;
    document.getElementById('user-balance').innerText = currentUser.balance;
    document.getElementById('user-role').innerText = currentUser.role;
}

// Start Mining
document.getElementById('start-mining-btn').onclick = async () => {
    const res = await fetch(`${API_URL}?action=STARTMINING&uid=${currentUser.uid}`);
    const data = await res.json();
    if(data.success){
        currentUser.balance = data.data.balance;
        document.getElementById('user-balance').innerText = currentUser.balance;
        document.getElementById('mining-msg').innerText = `Mined ${data.data.mined} Rida!`;
    } else {
        document.getElementById('mining-msg').innerText = data.msg;
    }
}

// Admin Broadcast
document.getElementById('broadcast-btn').onclick = async () => {
    const message = document.getElementById('broadcast-msg').value;
    const res = await fetch(`${API_URL}?action=BROADCAST&uid=${currentUser.uid}&message=${encodeURIComponent(message)}`);
    const data = await res.json();
    document.getElementById('broadcast-status').innerText = data.success ? "Broadcast sent!" : data.msg;
}

// Navigation
document.getElementById('nav-mining').onclick = ()=> {
    document.getElementById('broadcast-section').style.display='none';
};
document.getElementById('nav-broadcast').onclick = ()=> {
    if(currentUser && currentUser.role === 'admin'){
        document.getElementById('broadcast-section').style.display='block';
    } else alert("Admin only");
};
document.getElementById('nav-dashboard').onclick = ()=> {
    document.getElementById('broadcast-section').style.display='none';
};
document.getElementById('nav-logout').onclick = ()=> { location.reload(); }

</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
