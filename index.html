<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NexusMine | Crypto Mining</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #03050b 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        .card {
            background: rgba(15, 25, 45, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 30px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #00ffcc, #0099ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #8aa9d1;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .toggle-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .toggle-btn {
            flex: 1;
            padding: 12px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #2a3a5a;
            border-radius: 12px;
            color: #8aa9d1;
            cursor: pointer;
            text-align: center;
        }

        .toggle-btn.active {
            background: rgba(0, 255, 204, 0.15);
            border-color: #00ffcc;
            color: #00ffcc;
        }

        input {
            width: 100%;
            padding: 14px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #2a3a5a;
            border-radius: 12px;
            color: white;
            margin-bottom: 15px;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(95deg, #0e2a3b, #0a1a2f);
            border: 1px solid #00ffcc;
            border-radius: 30px;
            color: #00ffcc;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

        .mine-btn {
            background: radial-gradient(circle at 30% 10%, #ffb347, #ff7e05);
            border: none;
            color: white;
            font-size: 18px;
        }

        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            font-size: 14px;
        }

        .error {
            background: rgba(255, 94, 126, 0.2);
            color: #ff5e7e;
        }

        .success {
            background: rgba(78, 255, 181, 0.2);
            color: #4effb5;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .balance {
            font-size: 24px;
            color: #00ffcc;
            font-weight: bold;
        }

        .mining-area {
            text-align: center;
            padding: 20px;
        }

        .mining-animation {
            font-size: 50px;
            margin: 20px 0;
        }

        .info-text {
            color: #8aa9d1;
            text-align: center;
            margin-top: 15px;
            font-size: 12px;
        }
    </style>
</head>
<body>
<div class="container" id="app"></div>

<script>
// ============================================
// IMPORTANT: REPLACE THIS WITH YOUR ACTUAL APPS SCRIPT URL
// ============================================
const API_URL = 'https://script.google.com/macros/s/AKfycbzaJ3N8ZQ8f9zwLXlbBL0P-ZurhvLr5za8kIIRRwBR3R8_WKR_3EU1I4Hv16IXpEmOz/exec';

// ============================================
// STATE
// ============================================
let currentUser = null;
let currentMode = 'login';

// ============================================
// API HELPER
// ============================================
async function callAPI(action, data = {}) {
    const params = new URLSearchParams({ action, ...data });
    const url = API_URL + '?' + params.toString();
    
    try {
        const response = await fetch(url);
        const result = await response.json();
        return result;
    } catch (error) {
        console.error('API Error:', error);
        return { success: false, msg: 'Network error: ' + error.message };
    }
}

// ============================================
// PASSWORD HASH
// ============================================
function hashPassword(password) {
    let hash = 0;
    for (let i = 0; i < password.length; i++) {
        hash = ((hash << 5) - hash) + password.charCodeAt(i);
        hash = hash & hash;
    }
    return btoa(password + '_nexus_' + Math.abs(hash));
}

// ============================================
// AUTH FUNCTIONS
// ============================================
async function register(email, password) {
    email = email.trim().toLowerCase();
    password = password.trim();
    
    if (!email || !password) {
        return { success: false, msg: 'All fields required' };
    }
    if (password.length < 4) {
        return { success: false, msg: 'Password must be at least 4 characters' };
    }
    
    // Check if user exists
    const existing = await callAPI('GET_USER', { email });
    if (existing.success) {
        return { success: false, msg: 'Email already registered' };
    }
    
    // Create new user
    const result = await callAPI('SAVE_USER', {
        userData: JSON.stringify({
            email: email,
            password: hashPassword(password),
            balance: 100,
            role: email === 'admin@nexus.com' ? 'admin' : 'user',
            status: 'unverified',
            lastMine: '',
            createdAt: new Date().toISOString()
        })
    });
    
    if (result.success) {
        return { success: true, msg: 'Registration successful! Please login.' };
    }
    return { success: false, msg: 'Registration failed' };
}

async function login(email, password) {
    email = email.trim().toLowerCase();
    password = password.trim();
    
    const user = await callAPI('GET_USER', { email });
    
    if (!user.success) {
        return { success: false, msg: 'User not found' };
    }
    
    if (user.password === hashPassword(password)) {
        return { success: true, user: user };
    }
    
    return { success: false, msg: 'Invalid password' };
}

// ============================================
// MINING FUNCTION
// ============================================
async function performMining() {
    const now = Date.now();
    const lastMine = currentUser.lastMine ? new Date(currentUser.lastMine).getTime() : 0;
    const hoursSince = (now - lastMine) / (1000 * 60 * 60);
    
    // Check cooldown (24 hours)
    if (lastMine > 0 && hoursSince < 24) {
        const remaining = (24 - hoursSince).toFixed(1);
        return { success: false, msg: `Cooldown: ${remaining} hours left` };
    }
    
    const reward = 0.5;
    const newBalance = currentUser.balance + reward;
    
    // Update balance
    const result = await callAPI('UPDATE_USER_BALANCE', {
        uid: currentUser.uid,
        amount: reward,
        operation: 'add'
    });
    
    if (result.success) {
        // Update last mine time
        await callAPI('SAVE_USER', {
            userData: JSON.stringify({
                email: currentUser.email,
                lastMine: new Date().toISOString()
            })
        });
        
        currentUser.balance = newBalance;
        currentUser.lastMine = new Date().toISOString();
        
        return { success: true, reward: reward, newBalance: newBalance };
    }
    
    return { success: false, msg: 'Mining failed. Please try again.' };
}

// ============================================
// UI RENDERING
// ============================================
function render() {
    const app = document.getElementById('app');
    
    if (!currentUser) {
        renderAuth(app);
    } else {
        renderDashboard(app);
    }
}

function renderAuth(container) {
    container.innerHTML = `
        <div class="card">
            <h1>⚡ NexusMine</h1>
            <div class="subtitle">Advanced Crypto Mining Platform</div>
            
            <div class="toggle-group">
                <div class="toggle-btn ${currentMode === 'login' ? 'active' : ''}" id="loginBtn">Login</div>
                <div class="toggle-btn ${currentMode === 'register' ? 'active' : ''}" id="registerBtn">Register</div>
            </div>
            
            <input type="email" id="email" placeholder="Email address">
            <input type="password" id="password" placeholder="Password">
            <button id="submitBtn">${currentMode === 'login' ? 'Login' : 'Register'}</button>
            <div id="message" class="message"></div>
        </div>
    `;
    
    document.getElementById('loginBtn').onclick = () => {
        currentMode = 'login';
        render();
    };
    
    document.getElementById('registerBtn').onclick = () => {
        currentMode = 'register';
        render();
    };
    
    document.getElementById('submitBtn').onclick = async () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const msgDiv = document.getElementById('message');
        
        if (currentMode === 'login') {
            const result = await login(email, password);
            if (result.success) {
                currentUser = result.user;
                render();
            } else {
                msgDiv.innerHTML = `<div class="error">❌ ${result.msg}</div>`;
            }
        } else {
            const result = await register(email, password);
            if (result.success) {
                msgDiv.innerHTML = `<div class="success">✅ ${result.msg}</div>`;
                document.getElementById('email').value = '';
                document.getElementById('password').value = '';
                setTimeout(() => {
                    currentMode = 'login';
                    render();
                }, 2000);
            } else {
                msgDiv.innerHTML = `<div class="error">❌ ${result.msg}</div>`;
            }
        }
    };
}

function renderDashboard(container) {
    const lastMine = currentUser.lastMine ? new Date(currentUser.lastMine).getTime() : 0;
    const canMine = !lastMine || (Date.now() - lastMine) >= (24 * 3600000);
    const hoursLeft = !canMine ? ((24 * 3600000 - (Date.now() - lastMine)) / 3600000).toFixed(1) : 0;
    const isAdmin = currentUser.role === 'admin';
    
    container.innerHTML = `
        <div class="card">
            <div class="dashboard-header">
                <div>
                    <div>${currentUser.email}</div>
                    <div style="font-size: 12px; color: #8aa9d1;">${currentUser.uid}</div>
                </div>
                <div class="balance">${currentUser.balance.toFixed(4)} NXM</div>
            </div>
            
            <div class="mining-area">
                <div class="mining-animation" id="miningAnim">⛏️ 💎 ⛏️</div>
                <button class="mine-btn" id="mineBtn" ${!canMine ? 'disabled' : ''}>
                    ${canMine ? '⚡ START MINING (+0.5 NXM)' : `⏰ COOLDOWN (${hoursLeft}h)`}
                </button>
                <div id="miningMsg" class="message"></div>
            </div>
            
            ${isAdmin ? `
            <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid #2a3a5a;">
                <div style="color: #00ffcc; margin-bottom: 10px;">👑 Admin Panel</div>
                <button id="adminBtn" style="background: rgba(183, 110, 255, 0.2); border-color: #b76eff; color: #b76eff;">View Admin Dashboard</button>
            </div>
            ` : ''}
            
            <div class="info-text">
                Mining reward: 0.5 NXM per session<br>
                Cooldown period: 24 hours
            </div>
            
            <button id="logoutBtn" style="margin-top: 15px; background: rgba(255, 94, 126, 0.2); border-color: #ff5e7e; color: #ff5e7e;">
                Logout
            </button>
        </div>
    `;
    
    // Mining button
    document.getElementById('mineBtn')?.addEventListener('click', async () => {
        const anim = document.getElementById('miningAnim');
        const btn = document.getElementById('mineBtn');
        const msgDiv = document.getElementById('miningMsg');
        
        anim.innerHTML = '🌀 MINING IN PROGRESS 🌀';
        btn.disabled = true;
        
        const result = await performMining();
        
        if (result.success) {
            anim.innerHTML = '✅ +0.5 NXM MINED! ✅';
            msgDiv.innerHTML = `<div class="success">Successfully mined 0.5 NXM!</div>`;
            setTimeout(() => render(), 2000);
        } else {
            anim.innerHTML = '⛏️ 💎 ⛏️';
            msgDiv.innerHTML = `<div class="error">❌ ${result.msg}</div>`;
            btn.disabled = false;
            if (result.msg.includes('Cooldown')) {
                setTimeout(() => render(), 2000);
            }
        }
    });
    
    // Admin button
    if (isAdmin) {
        document.getElementById('adminBtn')?.addEventListener('click', () => {
            alert('Admin panel coming soon! You can manage users from the Google Sheet directly.');
        });
    }
    
    // Logout
    document.getElementById('logoutBtn')?.addEventListener('click', () => {
        currentUser = null;
        render();
    });
}

// ============================================
// TEST CONNECTION ON START
// ============================================
async function testConnection() {
    const result = await callAPI('PING');
    if (!result.success) {
        const app = document.getElementById('app');
        app.innerHTML = `
            <div class="card">
                <h1>⚠️ Connection Error</h1>
                <div class="subtitle">Cannot connect to backend server</div>
                <div class="error" style="padding: 15px; margin-top: 20px;">
                    Please check that your Google Apps Script is deployed with "Anyone" access.
                </div>
                <div class="info-text" style="margin-top: 20px;">
                    Current URL: ${API_URL.substring(0, 60)}...
                </div>
            </div>
        `;
        return false;
    }
    return true;
}

// ============================================
// START APP
// ============================================
(async function init() {
    const connected = await testConnection();
    if (connected) {
        render();
    }
})();
</script>
</body>
</html>
