<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rida Network</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{background:#0b0f19;color:white;}
.card{
  background:#121826;
  border-radius:16px;
  padding:16px;
  box-shadow:0 0 15px rgba(0,0,0,0.5);
}
</style>
</head>

<body class="p-4">

<!-- LOGIN -->
<div id="auth" class="max-w-md mx-auto card">
  <h2 class="text-xl mb-4 text-center">Rida Network</h2>

  <input id="email" placeholder="Email" class="w-full p-2 mb-2 text-black rounded">
  <input id="password" type="password" placeholder="Password" class="w-full p-2 mb-2 text-black rounded">

  <div class="flex gap-2">
    <button onclick="register()" class="bg-green-500 w-1/2 p-2 rounded">Register</button>
    <button onclick="login()" class="bg-blue-500 w-1/2 p-2 rounded">Login</button>
  </div>

  <p id="msg" class="text-sm mt-2"></p>
</div>

<!-- DASHBOARD -->
<div id="app" class="hidden">

  <!-- HEADER -->
  <div class="flex justify-between items-center mb-4">
    <h2 class="text-lg font-bold">Rida Network</h2>
    <button onclick="logout()" class="text-red-400">Logout</button>
  </div>

  <!-- STATS -->
  <div class="grid grid-cols-2 gap-3 mb-4">
    <div class="card text-center">
      <p>Balance</p>
      <h2 id="balance" class="text-xl">0</h2>
    </div>

    <div class="card text-center">
      <p>Mining Rate</p>
      <h2>0.1 / day</h2>
    </div>

    <div class="card text-center">
      <p>Status</p>
      <h2 id="status">Inactive</h2>
    </div>

    <div class="card text-center">
      <p>UID</p>
      <h2 id="uid">---</h2>
    </div>
  </div>

  <!-- MINING -->
  <div class="card text-center mb-4">
    <button onclick="mine()" class="bg-blue-600 w-full p-3 rounded">
      ⛏️ Start Mining
    </button>
    <p id="mineMsg" class="text-sm mt-2"></p>
  </div>

  <!-- BROADCAST -->
  <div class="card mb-4">
    <textarea id="broadcastText" class="w-full p-2 text-black rounded" placeholder="Admin message"></textarea>
    <button onclick="broadcast()" class="bg-green-600 w-full p-2 mt-2 rounded">Send</button>
  </div>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbzBd1aQMLrn7hjdLgdBkg3lioyawl_GaG3BX-kLUyUZ0KA16DRa7SdsQuvccNnweBXC/exec";

let user = null;

// ---------- API HELPER ----------
async function api(params){
  const res = await fetch(API + "?" + new URLSearchParams(params));
  const text = await res.text();
  console.log("API:", text);

  try { return JSON.parse(text); }
  catch { return {success:false,msg:"Invalid server"}; }
}

// ---------- AUTH ----------
async function register(){
  const res = await api({
    action:"register",
    email:email.value,
    password:password.value
  });
  msg.innerText = res.msg;
}

async function login(){
  const res = await api({
    action:"login",
    email:email.value,
    password:password.value
  });

  if(res.success){
    user = res.data || res;
    localStorage.setItem("user", JSON.stringify(user));
    loadApp();
  }else{
    msg.innerText = res.msg;
  }
}

function logout(){
  localStorage.clear();
  location.reload();
}

// ---------- APP ----------
function loadApp(){
  auth.classList.add("hidden");
  app.classList.remove("hidden");

  balance.innerText = user.balance || 0;
  uid.innerText = user.uid || "N/A";
  status.innerText = "Ready";
}

// ---------- MINING ----------
async function mine(){
  const res = await api({
    action:"start_mining",
    uid:user.uid
  });

  if(res.success){
    user.balance = res.data.balance;
    balance.innerText = user.balance;
    mineMsg.innerText = "Mining success!";
  }else{
    mineMsg.innerText = res.msg;
  }
}

// ---------- BROADCAST ----------
async function broadcast(){
  const res = await api({
    action:"broadcast",
    message:broadcastText.value
  });

  alert(res.msg);
}

// ---------- INIT ----------
window.onload = ()=>{
  const saved = localStorage.getItem("user");
  if(saved){
    user = JSON.parse(saved);
    loadApp();
  }
};
</script>

</body>
</html>
