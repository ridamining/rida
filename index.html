<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rida Network</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
  background:#0b0f19;
  color:white;
  font-family:sans-serif;
}
.card{
  background:#121826;
  border-radius:20px;
  padding:20px;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}
.btn{
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}
.btn-blue{background:#2563eb;}
.btn-green{background:#16a34a;}
.btn-red{background:#dc2626;}
.hidden{display:none;}
</style>
</head>

<body class="p-4">

<!-- AUTH -->
<div id="auth" class="max-w-md mx-auto card">
  <h2 class="text-2xl font-bold mb-4 text-center">Rida Network</h2>

  <input id="email" placeholder="Email" class="w-full p-2 mb-2 text-black rounded">
  <input id="password" placeholder="Password" type="password" class="w-full p-2 mb-2 text-black rounded">

  <div class="flex gap-2">
    <button onclick="register()" class="btn btn-green w-1/2">Register</button>
    <button onclick="login()" class="btn btn-blue w-1/2">Login</button>
  </div>

  <p id="msg" class="text-sm mt-2"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden max-w-md mx-auto space-y-4">

  <div class="card text-center">
    <h2 class="text-xl font-bold">Balance</h2>
    <p id="balance" class="text-3xl">0</p>
  </div>

  <div class="card text-center">
    <button onclick="mine()" class="btn btn-blue w-full">Start Mining</button>
    <p id="mineMsg" class="text-sm mt-2"></p>
  </div>

  <div class="card">
    <h3 class="font-bold mb-2">Broadcast</h3>
    <textarea id="broadcastText" class="w-full text-black p-2 rounded"></textarea>
    <button onclick="broadcast()" class="btn btn-green w-full mt-2">Send</button>
  </div>

  <button onclick="logout()" class="btn btn-red w-full">Logout</button>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbzBd1aQMLrn7hjdLgdBkg3lioyawl_GaG3BX-kLUyUZ0KA16DRa7SdsQuvccNnweBXC/exec";

let user = null;

// ---------- AUTH ----------
function register(){
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  fetch(`${API}?action=register&email=${email}&password=${password}`)
  .then(res=>res.json())
  .then(data=>{
    showMsg(data.msg);
  });
}

function login(){
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  fetch(`${API}?action=login&email=${email}&password=${password}`)
  .then(res=>res.json())
  .then(data=>{
    if(data.success){
      user = data.data;
      localStorage.setItem("user", JSON.stringify(user));
      loadDashboard();
    } else {
      showMsg(data.msg);
    }
  });
}

function logout(){
  localStorage.removeItem("user");
  location.reload();
}

// ---------- DASHBOARD ----------
function loadDashboard(){
  document.getElementById('auth').classList.add('hidden');
  document.getElementById('dashboard').classList.remove('hidden');

  document.getElementById('balance').innerText = user.balance;
}

// ---------- MINING ----------
function mine(){
  fetch(`${API}?action=start_mining&uid=${user.uid}`)
  .then(res=>res.json())
  .then(data=>{
    if(data.success){
      user.balance = data.data.balance;
      document.getElementById('balance').innerText = user.balance;
      document.getElementById('mineMsg').innerText = "Mining success!";
    } else {
      document.getElementById('mineMsg').innerText = data.msg;
    }
  });
}

// ---------- BROADCAST ----------
function broadcast(){
  const text = document.getElementById('broadcastText').value;

  fetch(`${API}?action=broadcast&message=${encodeURIComponent(text)}`)
  .then(res=>res.json())
  .then(data=>{
    alert(data.msg);
  });
}

// ---------- HELPERS ----------
function showMsg(msg){
  document.getElementById('msg').innerText = msg;
}

// ---------- INIT ----------
window.onload = ()=>{
  const saved = localStorage.getItem("user");
  if(saved){
    user = JSON.parse(saved);
    loadDashboard();
  }
};
</script>

</body>
</html>
